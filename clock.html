<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Аналоговые часы</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* Контейнер для часов */
        .clock {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: #ffffff;
            border: 12px solid #2c3e50;
            position: relative;
            box-shadow: 
                0 20px 40px rgba(0, 0, 0, 0.2),
                inset 0 0 15px rgba(0, 0, 0, 0.05);
        }

      
        /* Общие стили для стрелок */
        .hand {
            position: absolute;
            left: 50%;
            top: 50%;
            /* Точка вращения - нижний центр стрелки */
            transform-origin: 50% 100%; 
            border-radius: 4px;
            z-index: 10;
            /* translateY(-100%) поднимает стрелку вверх от центра */
        }

        /* Часовая стрелка */
        .hour {
            width: 7px;
            height: 25%; /* 75px */
            background: #2c3e50;
            margin-left: -5px; /* Половина ширины для центрирования */
            box-shadow: 2px 2px 5px rgba(0,0,0,0.2);
        }

        /* Минутная стрелка */
        .minute {
            width: 5px;
            height: 35%; /* 105px */
            background: #34495e;
            margin-left: -3px;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.15);
        }

        /* Секундная стрелка */
        .second {
            width: 2px;
            height: 42%; /* 126px */
            background: #e74c3c;
            margin-left: -1px;
            z-index: 15;
        }

        /* Центральная ось */
        .center-dot {
            position: absolute;
            width: 16px;
            height: 16px;
            background: #e74c3c;
            border-radius: 50%;
            left: calc(50% - 8px);
            top: calc(50% - 8px);
            z-index: 20;
            box-shadow: 0 0 5px rgba(0,0,0,0.3);
            border: 2px solid #fff;
        }
    </style>
</head>
<body>

    <div class="clock" id="clock">
        <!-- Деления добавятся через JS -->
        <div class="hand hour" id="hour"></div>
        <div class="hand minute" id="minute"></div>
        <div class="hand second" id="second"></div>
        <div class="center-dot"></div>
    </div>

    <script>
        const clock = document.getElementById('clock');
        const hourHand = document.getElementById('hour');
        const minuteHand = document.getElementById('minute');
        const secondHand = document.getElementById('second');

        // Создаем 12 делений на циферблате
        for (let i = 0; i < 12; i++) {
            const tick = document.createElement('div');
            tick.className = 'tick';
            tick.style.transform = `rotate(${i * 30}deg)`;
            clock.appendChild(tick);
        }

        // Функция обновления часов
        function updateClock() {
            const now = new Date();
            
            // Получаем миллисекунды для плавного хода секундной стрелки
            const ms = now.getMilliseconds();
            const seconds = now.getSeconds() + ms / 1000;
            const minutes = now.getMinutes() + seconds / 60;
            const hours = (now.getHours() % 12) + minutes / 60;

            // Вычисляем градусы (360 градусов / 60 секунд = 6 градусов в секунду)
            const secondDeg = (seconds / 60) * 360;
            const minuteDeg = (minutes / 60) * 360;
            const hourDeg = (hours / 12) * 360;

            // Применяем трансформации
            // translateY(-100%) нужен, чтобы стрелка росла вверх от центра, а не вниз
            secondHand.style.transform = `translateY(-100%) rotate(${secondDeg}deg)`;
            minuteHand.style.transform = `translateY(-100%) rotate(${minuteDeg}deg)`;
            hourHand.style.transform = `translateY(-100%) rotate(${hourDeg}deg)`;

            // requestAnimationFrame обеспечивает плавную анимацию (~60 кадров в секунду)
            requestAnimationFrame(updateClock);
        }

        // Запускаем часы
        updateClock();
    </script>
</body>
</html>
