<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Расписание 1-4</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #f0f8f0;
            font-family: 'Segoe UI', Arial, sans-serif;
        }
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 6px;
        }

        .container {
            width: 100%;
            height: 99vh;
            max-width: 1700px;
            background: #ffffff;
            border-radius: 20px;
            padding: 12px 18px;
            border: 1px solid #b8d4b8;
            display: flex;
            flex-direction: column;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.08);
        }

        .header {
            flex-shrink: 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #c6e0c6;
            padding-bottom: 6px;
            flex-wrap: wrap;
            gap: 5px;
        }
        .header-left {
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }
        .header-left h1 {
            color: #276749;
            font-size: clamp(20px, 2.8vh, 36px);
            font-weight: 700;
        }
        .header-left .day-indicator {
            color: #fff;
            font-size: clamp(15px, 2vh, 26px);
            font-weight: 600;
            background: #38a169;
            padding: 2px 16px;
            border-radius: 20px;
        }
        .header-left .subtitle {
            color: #4a5568;
            font-size: clamp(12px, 1.5vh, 18px);
        }
        .header-center {
            text-align: center;
            flex: 1;
        }
        .header-center .date {
            color: #4a5568;
            font-size: clamp(13px, 1.7vh, 22px);
            font-weight: 600;
        }
        .header-right {
            text-align: right;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 2px;
        }
        .header-right .time {
            color: #38a169;
            font-size: clamp(18px, 2.5vh, 32px);
            font-weight: 700;
        }
        .header-right .period {
            color: #c05621;
            font-size: clamp(13px, 1.7vh, 22px);
            font-weight: 600;
        }
        .header-right .version {
            color: #718096;
            font-size: clamp(10px, 1.2vh, 15px);
            font-weight: 500;
            background: #e6f0e6;
            padding: 0 10px;
            border-radius: 12px;
        }

        .table-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-height: 0;
            margin-top: 4px;
            overflow: hidden;
        }
        table {
            width: 100%;
            height: 100%;
            border-collapse: collapse;
            font-size: clamp(12px, 1.6vh, 22px);
            table-layout: fixed;
        }

        thead th,
        tbody td {
            border-right: 2px solid #d0d7e0;
        }
        thead th:last-child,
        tbody td:last-child {
            border-right: none;
        }

        thead th {
            background: #e6f0e6;
            color: #276749;
            font-weight: 700;
            padding: 0.4vh 6px;
            text-align: center;
            border-bottom: 3px solid #38a169;
            font-size: clamp(10px, 1.3vh, 17px);
            text-transform: uppercase;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        thead th:first-child {
            width: 4%;
            min-width: 28px;
        }
        thead th:not(:first-child) {
            width: 8%;
        }

        tbody td {
            padding: 0.3vh 6px;
            color: #2d3748;
            border-bottom: 1px solid #e2e8f0;
            vertical-align: middle;
            text-align: center;
            word-wrap: break-word !important;
            word-break: break-word !important;
            white-space: normal !important;
            overflow-wrap: break-word !important;
            hyphens: auto !important;
            -webkit-hyphens: auto !important;
            -moz-hyphens: auto !important;
            -ms-hyphens: auto !important;
            line-height: 1.3;
            font-size: clamp(12px, 1.8vh, 22px) !important;
        }
        tbody tr:nth-child(even) {
            background: #f7fcf7;
        }
        tbody tr:nth-child(odd) {
            background: #ffffff;
        }

        tbody tr.current-lesson {
            background: #c6f0c6 !important;
        }
        tbody tr.current-lesson td {
            color: #1a365d;
            font-weight: 600;
        }
        tbody tr.current-lesson .lesson-num {
            color: #38a169;
        }

        .lesson-num {
            font-weight: 700;
            color: #4a5568;
            font-size: clamp(12px, 1.7vh, 22px) !important;
        }

        .subject {
            display: block;
            font-weight: 500;
            line-height: 1.3;
            color: #2d3748;
            font-size: clamp(12px, 1.8vh, 22px) !important;
            word-wrap: break-word !important;
            word-break: break-word !important;
            white-space: normal !important;
            overflow-wrap: break-word !important;
            hyphens: auto !important;
            -webkit-hyphens: auto !important;
            -moz-hyphens: auto !important;
            -ms-hyphens: auto !important;
        }

        .cabinet {
            color: #c05621;
            font-size: 20px !important;
            display: block;
            font-weight: 700;
            margin-top: 2px;
        }

        .empty-cell {
            color: #cbd5e0;
        }

        .footer {
            flex-shrink: 0;
            margin-top: 3px;
            color: #a0aec0;
            font-size: clamp(9px, 1.2vh, 14px);
            text-align: center;
            border-top: 1px solid #e2e8f0;
            padding-top: 3px;
        }

        .loading-overlay {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100%;
            color: #4a5568;
            font-size: clamp(14px, 2vh, 24px);
            font-weight: 300;
            flex-direction: column;
            gap: 10px;
        }
        .loading-overlay .sub {
            font-size: 0.6em;
            color: #a0aec0;
        }

        .elementary-badge {
            display: inline-block;
            background: #38a169;
            color: white;
            font-size: clamp(10px, 1.2vh, 16px);
            padding: 0 12px;
            border-radius: 12px;
            font-weight: 600;
        }

        @media (max-width: 800px) {
            .container {
                padding: 6px 8px;
                border-radius: 12px;
                height: 99vh;
            }
            thead th,
            tbody td {
                padding: 0.2vh 3px;
            }
            tbody td {
                font-size: clamp(9px, 1.4vh, 16px) !important;
            }
            .subject {
                font-size: clamp(9px, 1.4vh, 16px) !important;
            }
            .cabinet {
                font-size: 15px !important;
            }
            .lesson-num {
                font-size: clamp(10px, 1.5vh, 17px) !important;
            }
            thead th:not(:first-child) {
                width: 7%;
            }
        }

        @media print {
            .no-print {
                display: none !important;
            }
            body,
            html {
                background: white !important;
                overflow: visible !important;
            }
            .container {
                border: none !important;
                box-shadow: none !important;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <div class="header-left">
                <h1>🌱 Расписание</h1>
                <span class="day-indicator" id="dayIndicator">ПН</span>
                <span class="subtitle" id="dateSubtitle">Начальная школа 1-4</span>
                <span class="elementary-badge">1-4</span>
            </div>
            <div class="header-center">
                <div class="date" id="currentDate">--.--.----</div>
            </div>
            <div class="header-right">
                <div class="time" id="currentTime">--:--:--</div>
                <div class="period" id="currentPeriod">Загрузка...</div>
                <div class="version" id="versionBadge">🏷️ v1.0</div>
            </div>
        </div>

        <div class="table-wrapper" id="tableWrapper">
            <table id="scheduleTable">
                <thead id="tableHead">
                    <tr><th>№</th></tr>
                </thead>
                <tbody id="scheduleBody">
                    <tr>
                        <td colspan="20" class="loading-overlay">
                            ⏳ Загрузка...
                            <span class="sub" id="loadStatus"></span>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div class="footer no-print">
            🌱 Начальная школа · 🔄 Обновляется каждую минуту · Текущий урок подсвечен
        </div>
    </div>

    <script>
        // ================================================================
        // КОНФИГУРАЦИЯ
        // ================================================================
        var LESSON_TIMES = ["08:30", "09:20", "10:10", "11:00", "11:50", "12:40"];
        var MAX_LESSONS = 6;

        var weekDays = {};
        var classNames = [];
        var dataLoaded = false;
        var APP_VERSION = 'v1.0';

        // ================================================================
        // КЛАССЫ НАЧАЛЬНОЙ ШКОЛЫ (1-4)
        // ================================================================
        var ELEMENTARY_CLASSES = ['1А', '1Б', '1В', '2А', '2Б', '2В', '3А', '3Б', '3В', '4А', '4Б', '4В'];

        // ================================================================
        // ДНИ НЕДЕЛИ
        // ================================================================
        var DAYS_SHORT = { 1: "ПН", 2: "ВТ", 3: "СР", 4: "ЧТ", 5: "ПТ", 6: "СБ", 0: "ВС" };
        var DAYS_FULL = { 1: "Понедельник", 2: "Вторник", 3: "Среда", 4: "Четверг", 5: "Пятница", 6: "Суббота", 0: "Воскресенье" };
        var DAYS_LIST = ['ПН', 'ВТ', 'СР', 'ЧТ', 'ПТ', 'СБ'];

        // ================================================================
        // ВЕРСИЯ
        // ================================================================
        document.getElementById('versionBadge').textContent = '🏷️ ' + APP_VERSION;

        // ================================================================
        // ЗАГРУЗКА DATA.JSON
        // ================================================================
        function loadData() {
            var statusEl = document.getElementById('loadStatus');
            if (statusEl) statusEl.textContent = 'Загрузка data.json...';

            fetch('data.json?t=' + Date.now())
                .then(function(res) {
                    if (!res.ok) throw new Error('data.json не найден (код ' + res.status + ')');
                    return res.json();
                })
                .then(function(data) {
                    var scheduleData = null;

                    // Проверяем структуру data.json
                    if (data.schedule) {
                        // Структура с версией и schedule
                        if (data.adminVersion) {
                            APP_VERSION = data.adminVersion;
                            document.getElementById('versionBadge').textContent = '🏷️ ' + APP_VERSION;
                        }
                        // Берём только elementary
                        if (data.schedule.elementary) {
                            scheduleData = data.schedule.elementary;
                        } else {
                            // Если нет elementary, пробуем взять всё
                            scheduleData = data.schedule;
                        }
                    } else if (data.elementary) {
                        // Структура с elementary без обёртки
                        scheduleData = data.elementary;
                    } else {
                        // Прямая структура дней
                        scheduleData = data;
                    }

                    // Проверяем, что получилось
                    var hasDays = false;
                    DAYS_LIST.forEach(function(day) {
                        if (scheduleData && scheduleData[day]) {
                            hasDays = true;
                            // Фильтруем только начальные классы
                            var filtered = {};
                            Object.keys(scheduleData[day]).forEach(function(cls) {
                                if (ELEMENTARY_CLASSES.indexOf(cls) !== -1) {
                                    filtered[cls] = scheduleData[day][cls];
                                }
                            });
                            if (Object.keys(filtered).length > 0) {
                                weekDays[day] = filtered;
                            } else {
                                weekDays[day] = {};
                            }
                        }
                    });

                    if (!hasDays) {
                        // Возможно данные в другом формате
                        Object.keys(scheduleData || {}).forEach(function(key) {
                            if (DAYS_LIST.indexOf(key) !== -1) {
                                var filtered = {};
                                Object.keys(scheduleData[key] || {}).forEach(function(cls) {
                                    if (ELEMENTARY_CLASSES.indexOf(cls) !== -1) {
                                        filtered[cls] = scheduleData[key][cls];
                                    }
                                });
                                if (Object.keys(filtered).length > 0) {
                                    weekDays[key] = filtered;
                                    hasDays = true;
                                } else {
                                    weekDays[key] = {};
                                }
                            }
                        });
                    }

                    // Если данных нет — создаём пустые
                    if (!hasDays) {
                        DAYS_LIST.forEach(function(day) {
                            weekDays[day] = {};
                        });
                    }

                    // Добавляем недостающие дни
                    DAYS_LIST.forEach(function(day) {
                        if (!weekDays[day]) {
                            weekDays[day] = {};
                        }
                    });

                    if (statusEl) statusEl.textContent = '✅ data.json загружен (v' + APP_VERSION + ')';
                    processLoadedData();
                })
                .catch(function(err) {
                    console.warn('Ошибка загрузки data.json:', err.message);
                    if (statusEl) statusEl.textContent = '❌ ' + err.message;
                    // Создаём пустые данные
                    DAYS_LIST.forEach(function(day) {
                        weekDays[day] = {};
                    });
                    processLoadedData();
                });
        }

        // ================================================================
        // ОБРАБОТКА ЗАГРУЖЕННЫХ ДАННЫХ
        // ================================================================
        function processLoadedData() {
            classNames = ELEMENTARY_CLASSES;

            // Заполняем пустые уроки для отсутствующих классов
            DAYS_LIST.forEach(function(day) {
                var dayData = weekDays[day] || {};
                classNames.forEach(function(cls) {
                    if (!dayData[cls]) {
                        dayData[cls] = [];
                        for (var i = 0; i < MAX_LESSONS; i++) {
                            dayData[cls].push(['', '']);
                        }
                    } else {
                        var lessons = dayData[cls];
                        while (lessons.length < MAX_LESSONS) {
                            lessons.push(['', '']);
                        }
                    }
                });
                weekDays[day] = dayData;
            });

            dataLoaded = true;
            renderTable();
        }

        // ================================================================
        // СОРТИРОВКА КЛАССОВ
        // ================================================================
        function sortClasses(classes) {
            var letters = "АБВГДЕЁЖЗИЙКЛМНОПРСТУФХЦЧШЩЪЫЬЭЮЯ";
            return classes.sort(function(a, b) {
                var numA = parseInt(a.match(/\d+/)?.[0] || 0);
                var numB = parseInt(b.match(/\d+/)?.[0] || 0);
                if (numA !== numB) return numA - numB;
                var lA = a.match(/[А-Я]/)?.[0] || '';
                var lB = b.match(/[А-Я]/)?.[0] || '';
                return letters.indexOf(lA) - letters.indexOf(lB);
            });
        }

        // ================================================================
        // ДЕНЬ НЕДЕЛИ
        // ================================================================
        function getCurrentDay() {
            var now = new Date();
            var dayNum = now.getDay();
            var dayKey = DAYS_SHORT[dayNum] || "ПН";
            var dayFull = DAYS_FULL[dayNum] || "Понедельник";

            if (!weekDays[dayKey] || Object.keys(weekDays[dayKey]).length === 0) {
                for (var i = 0; i < DAYS_LIST.length; i++) {
                    var d = DAYS_LIST[i];
                    if (weekDays[d] && Object.keys(weekDays[d]).length > 0) {
                        return { key: d, full: DAYS_FULL[DAYS_LIST.indexOf(d) + 1] || d };
                    }
                }
                return { key: "ПН", full: "Понедельник" };
            }
            return { key: dayKey, full: dayFull };
        }

        function getCurrentLesson() {
            var now = new Date();
            var minutes = now.getHours() * 60 + now.getMinutes();
            for (var i = LESSON_TIMES.length - 1; i >= 0; i--) {
                var parts = LESSON_TIMES[i].split(':');
                var h = parseInt(parts[0]);
                var m = parseInt(parts[1]);
                if (minutes >= h * 60 + m) return i + 1;
            }
            return 0;
        }

        function getPeriodName(lessonNum) {
            if (lessonNum === 0) return "⏰ До начала занятий";
            if (lessonNum > MAX_LESSONS) return "🎉 Занятия окончены";
            return '📖 ' + lessonNum + '-й урок (' + LESSON_TIMES[lessonNum - 1] + ')';
        }

        // ================================================================
        // ОТРИСОВКА
        // ================================================================
        function renderTable() {
            if (!dataLoaded && Object.keys(weekDays).length === 0) return;

            var dayInfo = getCurrentDay();
            var dayKey = dayInfo.key;
            var dayFull = dayInfo.full;
            var currentLesson = getCurrentLesson();

            var now = new Date();
            var dateStr = now.toLocaleDateString('ru-RU', {
                day: '2-digit',
                month: '2-digit',
                year: 'numeric',
                weekday: 'long'
            });

            document.getElementById('dayIndicator').textContent = dayFull;
            document.getElementById('dateSubtitle').textContent = 'Начальная школа 1-4';
            document.getElementById('currentDate').textContent = dateStr;
            document.getElementById('currentPeriod').textContent = getPeriodName(currentLesson);

            var dayData = weekDays[dayKey];
            if (!dayData || Object.keys(dayData).length === 0) {
                document.getElementById('scheduleBody').innerHTML =
                    '<tr><td colspan="20" class="loading-overlay">📌 Нет расписания на ' + dayFull +
                    '<span class="sub">Загрузите данные для этого дня</span></td></tr>';
                return;
            }

            var classes = Object.keys(dayData).filter(function(cls) {
                return ELEMENTARY_CLASSES.indexOf(cls) !== -1;
            });

            if (classes.length === 0) {
                classes = ELEMENTARY_CLASSES;
            }
            classes = sortClasses(classes);

            var headerHTML = '<tr><th>№</th>';
            classes.forEach(function(cls) { headerHTML += '<th>' + cls + '</th>'; });
            headerHTML += '</tr>';
            document.getElementById('tableHead').innerHTML = headerHTML;

            var bodyHTML = '';
            for (var lessonNum = 1; lessonNum <= MAX_LESSONS; lessonNum++) {
                var idx = lessonNum - 1;
                var isCurrent = (lessonNum === currentLesson && currentLesson >= 1 && currentLesson <= MAX_LESSONS);
                bodyHTML += '<tr class="' + (isCurrent ? 'current-lesson' : '') + '">';
                bodyHTML += '<td><span class="lesson-num">' + lessonNum + '</span></td>';

                classes.forEach(function(cls) {
                    var lessons = dayData[cls] || [];
                    var lesson = lessons[idx] || ['', ''];
                    var subject = '';
                    var cabinet = '';
                    if (Array.isArray(lesson)) {
                        subject = lesson[0] || '';
                        cabinet = lesson[1] || '';
                    } else if (typeof lesson === 'object' && lesson !== null) {
                        subject = lesson.subject || lesson[0] || '';
                        cabinet = lesson.room || lesson[1] || '';
                    }
                    if (subject && subject.trim() !== '') {
                        bodyHTML += '<td><span class="subject">' + subject + '</span><span class="cabinet">' +
                            cabinet + '</span></td>';
                    } else {
                        bodyHTML += '<td class="empty-cell">—</td>';
                    }
                });
                bodyHTML += '</tr>';
            }
            document.getElementById('scheduleBody').innerHTML = bodyHTML;
        }

        // ================================================================
        // ЧАСЫ
        // ================================================================
        function updateTime() {
            var now = new Date();
            document.getElementById('currentTime').textContent =
                now.toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
        }

        function refreshAll() {
            updateTime();
            if (dataLoaded || Object.keys(weekDays).length > 0) renderTable();
        }

        // ================================================================
        // ЗАПУСК
        // ================================================================
        loadData();
        setInterval(refreshAll, 1000);
        setInterval(function() {
            loadData();
        }, 60000);
    </script>

</body>
</html>
