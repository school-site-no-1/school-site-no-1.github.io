<!-- clock.html -->
<div style="display:flex;align-items:center;gap:12px;font-family:'Segoe UI',Arial,sans-serif;">
    <svg width="65" height="65" viewBox="0 0 65 65" style="flex-shrink:0;">
        <circle cx="32.5" cy="32.5" r="28" fill="none" stroke="#2b6cb0" stroke-width="2"/>
        <circle cx="32.5" cy="32.5" r="2" fill="#2b6cb0"/>
        <line id="hourHand" x1="32.5" y1="32.5" x2="32.5" y2="15" stroke="#1a365d" stroke-width="3" stroke-linecap="round"/>
        <line id="minuteHand" x1="32.5" y1="32.5" x2="32.5" y2="12" stroke="#2b6cb0" stroke-width="2" stroke-linecap="round"/>
        <line id="secondHand" x1="32.5" y1="32.5" x2="32.5" y2="10" stroke="#e53e3e" stroke-width="1" stroke-linecap="round"/>
        <line x1="32.5" y1="4.5" x2="32.5" y2="7.5" stroke="#a0aec0" stroke-width="1"/>
        <line x1="32.5" y1="57.5" x2="32.5" y2="60.5" stroke="#a0aec0" stroke-width="1"/>
        <line x1="4.5" y1="32.5" x2="7.5" y2="32.5" stroke="#a0aec0" stroke-width="1"/>
        <line x1="57.5" y1="32.5" x2="60.5" y2="32.5" stroke="#a0aec0" stroke-width="1"/>
    </svg>
    <div style="display:flex;flex-direction:column;align-items:flex-start;">
        <div style="font-size:1.8em;font-weight:700;color:#2b6cb0;letter-spacing:1px;">
            <span id="clockTime">00:00</span>
        </div>
        <div style="font-size:0.65em;color:#718096;">
            
        </div>
    </div>
</div>
<script>
function updateClock() {
    var now = new Date();
    var hours = now.getHours();
    var minutes = now.getMinutes();
    var seconds = now.getSeconds();
    
    document.getElementById('clockTime').textContent = 
        String(hours).padStart(2, '0') + ':' + String(minutes).padStart(2, '0');
    
   
    
    var hourAngle = (hours % 12) * 30 + minutes * 0.5;
    var minuteAngle = minutes * 6 + seconds * 0.1;
    var secondAngle = seconds * 6;
    
    document.getElementById('hourHand').setAttribute('transform', 'rotate(' + hourAngle + ', 32.5, 32.5)');
    document.getElementById('minuteHand').setAttribute('transform', 'rotate(' + minuteAngle + ', 32.5, 32.5)');
    document.getElementById('secondHand').setAttribute('transform', 'rotate(' + secondAngle + ', 32.5, 32.5)');
}
updateClock();
setInterval(updateClock, 1000);
</script>
