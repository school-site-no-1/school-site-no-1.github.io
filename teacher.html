<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Расписание уроков</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Segoe UI',Arial,sans-serif;background:#f0f4f8;padding:16px;color:#2d3748}
        .container{max-width:1200px;margin:0 auto;background:#fff;border-radius:16px;border:1px solid #e2e8f0;padding:20px;box-shadow:0 2px 8px rgba(0,0,0,.05)}
        .header{display:flex;justify-content:space-between;align-items:center;border-bottom:2px solid #2b6cb0;padding-bottom:8px;margin-bottom:8px;flex-wrap:wrap}
        .header-center{text-align:center;flex:1;font-size:1.25em;font-weight:700;color:#c53030;letter-spacing:.5px;text-transform:lowercase;padding:2px 0;line-height:1.3}
        .header-left{display:flex;flex-direction:column;min-width:100px}
        .header-left .name{font-size:1.15em;font-weight:700;color:#1a365d}
        .header-left .subtitle{font-size:.85em;color:#718096}
        
        /* Стили для селекта */
        .teacher-selector {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 4px 10px;
            background: #ebf8ff;
            border: 1px solid #bee3f8;
            border-radius: 8px;
            margin-bottom: 8px;
            flex-wrap: wrap;
        }
        .teacher-selector label {
            font-weight: 600;
            color: #2b6cb0;
            font-size: 0.9em;
            white-space: nowrap;
        }
        .teacher-selector select {
            padding: 6px 12px;
            border: 1px solid #2b6cb0;
            border-radius: 6px;
            font-size: 0.9em;
            background: #fff;
            color: #2d3748;
            cursor: pointer;
            min-width: 200px;
            outline: none;
        }
        .teacher-selector select:hover {
            border-color: #1a4f8b;
        }
        .teacher-selector select:focus {
            box-shadow: 0 0 0 3px rgba(43, 108, 176, 0.2);
        }
        .teacher-selector .refresh-btn {
            padding: 4px 12px;
            background: #2b6cb0;
            color: #fff;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85em;
            transition: background 0.2s;
        }
        .teacher-selector .refresh-btn:hover {
            background: #1a4f8b;
        }
        
        .info{display:flex;justify-content:space-between;font-size:1.2em;color:#718096;padding:4px 10px;background:#ebf8ff;border:1px solid #bee3f8;margin-bottom:6px;border-radius:8px;flex-wrap:wrap;gap:4px}
        .info .count{color:#2b6cb0;font-weight:600}
        .info .update{color:#a0aec0;font-size:.85em}
        .table-wrap{overflow-x:auto}
        table{width:100%;border-collapse:collapse;font-size:1.4em;min-width:650px}
        thead th{background:#2b6cb0;color:#fff;padding:10px 12px;text-align:center;font-weight:700;font-size:.85em;white-space:nowrap;letter-spacing:.5px;text-transform:uppercase;border-bottom:3px solid #1a4f8b}
        tbody tr{border-bottom:3px solid #cbd5e0}
        tbody tr:last-child{border-bottom:none}
        tbody tr.current{background:#bee3f8;font-weight:700}
        tbody tr.current td{color:#1a365d}
        tbody tr.current td.num{color:#1a4f8b;font-weight:800}
        tbody td{padding:8px 10px;text-align:center;font-size:.95em;vertical-align:middle}
        tbody td.num{font-weight:800;color:#1a365d;font-size:1.2em;text-align:center;vertical-align:middle}
        tbody td.period{padding:6px 10px;vertical-align:middle;text-align:center;white-space:nowrap}
        tbody td.period .time-start{font-weight:700;color:#2b6cb0;font-size:1.1em;line-height:1.3}
        tbody td.period .time-end{color:#718096;font-size:.9em;line-height:1.3;margin-top:2px}
        tbody tr.current td.period .time-start{color:#1a4f8b;font-weight:800}
        tbody tr.current td.period .time-end{color:#2b6cb0;font-weight:700}
        tbody td.class{font-weight:700;color:#1a365d;font-size:1.05em;white-space:nowrap;line-height:1.3;min-width:60px}
        tbody td.subject{text-align:center;padding-left:14px;font-weight:600;font-size:1.05em;min-width:120px}
        tbody td.room{font-weight:700;color:#e65100;font-size:1.05em;white-space:nowrap;line-height:1.3;min-width:60px}
        .footer{text-align:center;color:#a0aec0;font-size:.8em;border-top:1px solid #e2e8f0;padding-top:8px;margin-top:8px;display:flex;justify-content:center;gap:16px;flex-wrap:wrap}
        .no-lessons-msg{text-align:center;padding:30px 0;color:#a0aec0;font-size:1.2em}
        
        @media(max-width:900px){body{padding:12px}.container{padding:16px;border-radius:16px}.header-center{font-size:1em}.header-left .name{font-size:1em}table{font-size:1.2em;min-width:500px}thead th,td{padding:5px 6px}.info{font-size:.9em}.footer{font-size:.65em}tbody td.period .time-start{font-size:.95em}tbody td.period .time-end{font-size:.85em}.teacher-selector select{min-width:150px;font-size:.8em}}
        @media(max-width:600px){body{padding:8px}.container{padding:12px;border-radius:12px}.header{flex-wrap:nowrap;justify-content:space-between;gap:0;align-items:center}.header-center{font-size:.85em;flex:0 1 auto;order:2;padding:2px 0;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:40%}.header-left{min-width:auto;flex:0 1 auto;order:1;text-align:left;white-space:nowrap}.header-left .name{font-size:.8em}.header-left .subtitle{font-size:.6em}table{font-size:.9em;min-width:320px}thead th,td{padding:3px 4px;font-size:.8em}td.subject{padding-left:4px;text-align:center!important}td.num{font-size:.9em}td.class{font-size:.7em;white-space:normal;min-width:30px}td.room{font-size:.7em;white-space:normal;min-width:30px}tbody td.period .time-start{font-size:.8em}tbody td.period .time-end{font-size:.7em}.info{font-size:.6em;padding:4px 8px;border-radius:6px}.footer{font-size:.5em;gap:6px}.teacher-selector{padding:4px 8px;gap:5px}.teacher-selector select{min-width:120px;font-size:.7em;padding:4px 8px}.teacher-selector label{font-size:.75em}.teacher-selector .refresh-btn{font-size:.7em;padding:3px 8px}}
    </style>
</head>
<body>

<div class="container">
    <!-- Шапка -->
    <div class="header">
        <div class="header-left">
            <span class="name" id="teacherName">📋 Загрузка...</span>
            <span class="subtitle" id="teacherSubtitle">Расписание на сегодня</span>
        </div>
        <div class="header-center" id="changesText">📌 Изменения<br>на сегодня</div>
    </div>

    <!-- Выбор учителя -->
    <div class="teacher-selector">
        <label for="teacherSelect">👨‍🏫 Учитель:</label>
        <select id="teacherSelect">
            <option value="">Загрузка списка...</option>
        </select>
        <button class="refresh-btn" onclick="refreshData()">🔄 Обновить</button>
    </div>

    <!-- Инфо -->
    <div class="info">
        <span class="count" id="lessonCount">📚 0 уроков</span>
        <span class="update" id="updateTime">🔄 обновлено: загрузка...</span>
    </div>

    <!-- Таблица -->
    <div class="table-wrap">
        <div id="scheduleTable">
            <div class="no-lessons-msg">⏳ Загрузка расписания...</div>
        </div>
    </div>

    <!-- Футер -->
    <div class="footer">
        <span class="version">🏷️ v6.0.0</span>
        <span class="gen-time" id="genTime">📅 загрузка...</span>
    </div>
</div>

<script>
(function() {
    'use strict';

    // ===== КОНСТАНТЫ =====
    const DAYS = ['ПН', 'ВТ', 'СР', 'ЧТ', 'ПТ', 'СБ'];
    const DAYS_RU = ['Понедельник', 'Вторник', 'Среда', 'Четверг', 'Пятница', 'Суббота'];
    const DAYS_PREP = ['понедельник', 'вторник', 'среду', 'четверг', 'пятницу', 'субботу'];
    const LESSON_PERIODS = [
        {start:'08:30',end:'09:10'},{start:'09:20',end:'10:00'},
        {start:'10:10',end:'10:50'},{start:'11:05',end:'11:45'},
        {start:'12:00',end:'12:40'},{start:'12:55',end:'13:35'},
        {start:'13:45',end:'14:25'},{start:'14:35',end:'15:15'},
        {start:'15:25',end:'16:05'}
    ];

    // ===== ПЕРЕМЕННЫЕ =====
    let teachersList = [];
    let currentTeacher = null;
    let currentDay = '';
    let currentScheduleData = {};

    // ===== ПАРАМЕТРЫ URL =====
    const urlParams = new URLSearchParams(window.location.search);
    const teacherParam = urlParams.get('teacher') || urlParams.get('id') || '';
    const dayParam = urlParams.get('day') || urlParams.get('d') || '';

    // ===== ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ =====
    function getLessonWord(num) {
        const lastDigit = num % 10;
        const lastTwoDigits = num % 100;
        if (lastTwoDigits >= 11 && lastTwoDigits <= 19) return 'уроков';
        if (lastDigit === 1) return 'урок';
        if (lastDigit >= 2 && lastDigit <= 4) return 'урока';
        return 'уроков';
    }

    function parseTime(str) {
        if (!str) return 0;
        const parts = str.split(':');
        return parseInt(parts[0]) * 60 + parseInt(parts[1]);
    }

    function getScheduleDay() {
        const now = new Date();
        const totalMin = now.getHours() * 60 + now.getMinutes();
        const threshold = 16 * 60 + 40;

        const targetDate = new Date(now);
        if (totalMin >= threshold) {
            targetDate.setDate(targetDate.getDate() + 1);
        }

        let dayNum = targetDate.getDay();
        if (dayNum === 0) dayNum = 7;
        
        return {
            targetDay: DAYS[dayNum - 1] || 'ПН',
            targetDayFull: DAYS_RU[dayNum - 1] || 'Понедельник',
            targetDayPrep: DAYS_PREP[dayNum - 1] || 'понедельник',
            isTomorrow: totalMin >= threshold
        };
    }

    function getCurrentLessonNum() {
        const now = new Date();
        const totalMin = now.getHours() * 60 + now.getMinutes();
        for (let i = 0; i < LESSON_PERIODS.length; i++) {
            const start = parseTime(LESSON_PERIODS[i].start);
            const end = parseTime(LESSON_PERIODS[i].end);
            if (totalMin >= start && totalMin < end) {
                return i + 1;
            }
        }
        return 0;
    }

    // ===== ЗАГРУЗКА СПИСКА УЧИТЕЛЕЙ =====
    async function loadTeachersList() {
        try {
            const response = await fetch('/data/teachers.json?_=' + Date.now());
            if (!response.ok) {
                throw new Error('Не удалось загрузить список учителей');
            }
            const data = await response.json();
            teachersList = data.teachers || [];
            
            // Заполняем селект
            const select = document.getElementById('teacherSelect');
            select.innerHTML = '';
            
            if (teachersList.length === 0) {
                select.innerHTML = '<option value="">Нет учителей</option>';
                return;
            }

            // Добавляем опции
            teachersList.forEach((teacher, index) => {
                const option = document.createElement('option');
                option.value = teacher.id || teacher.name || index;
                option.textContent = teacher.name || teacher.id || `Учитель ${index + 1}`;
                if (teacher.id) {
                    option.dataset.id = teacher.id;
                }
                if (teacher.scheduleFile) {
                    option.dataset.scheduleFile = teacher.scheduleFile;
                }
                select.appendChild(option);
            });

            // Выбираем учителя из URL или первого
            let selectedTeacher = null;
            
            if (teacherParam) {
                // Ищем по имени или ID
                selectedTeacher = teachersList.find(t => 
                    t.name === teacherParam || 
                    t.id === teacherParam ||
                    t.fileName === teacherParam + '.html'
                );
                if (selectedTeacher) {
                    select.value = selectedTeacher.id || selectedTeacher.name;
                }
            }

            // Если не нашли - берем первого
            if (!selectedTeacher && teachersList.length > 0) {
                select.value = teachersList[0].id || teachersList[0].name;
                selectedTeacher = teachersList[0];
            }

            // Загружаем расписание выбранного учителя
            if (selectedTeacher) {
                currentTeacher = selectedTeacher;
                await loadTeacherSchedule(selectedTeacher);
            }

        } catch (error) {
            console.error('Ошибка загрузки списка учителей:', error);
            const select = document.getElementById('teacherSelect');
            select.innerHTML = '<option value="">❌ Ошибка загрузки</option>';
            showError('❌ Не удалось загрузить список учителей');
        }
    }

    // ===== ЗАГРУЗКА РАСПИСАНИЯ УЧИТЕЛЯ =====
    async function loadTeacherSchedule(teacher) {
        try {
            // Определяем день
            const dayInfo = getScheduleDay();
            currentDay = dayParam && DAYS.includes(dayParam.toUpperCase()) 
                ? dayParam.toUpperCase() 
                : dayInfo.targetDay;

            // Определяем файл расписания
            const scheduleFile = teacher.scheduleFile || 
                                teacher.fileName?.replace('.html', '.json') || 
                                `schedule_${teacher.id || 'default'}.json`;

            // Загружаем расписание
            const response = await fetch(`/data/${scheduleFile}?_=${Date.now()}`);
            if (!response.ok) {
                throw new Error(`Не удалось загрузить расписание: ${scheduleFile}`);
            }
            
            currentScheduleData = await response.json();

            // Обновляем интерфейс
            updateUI(teacher, currentScheduleData, currentDay);

        } catch (error) {
            console.error('Ошибка загрузки расписания:', error);
            showError('❌ ' + error.message);
        }
    }

    // ===== ОБНОВЛЕНИЕ ИНТЕРФЕЙСА =====
    function updateUI(teacher, scheduleData, day) {
        // Имя учителя
        const nameParts = teacher.name.split(' ');
        const shortName = nameParts.slice(0, 2).join(' ');
        document.getElementById('teacherName').textContent = '📋 ' + shortName;
        
        // День
        document.getElementById('teacherSubtitle').textContent = 
            `Расписание на ${DAYS_RU[DAYS.indexOf(day)]} (${day})`;
        
        const dayPrep = DAYS_PREP[DAYS.indexOf(day)] || 'сегодня';
        document.getElementById('changesText').innerHTML = 
            `📌 Изменения<br>на ${dayPrep}`;

        // Рендерим расписание
        renderSchedule(scheduleData, day);

        // Время обновления
        if (scheduleData.last_update) {
            document.getElementById('updateTime').textContent = 
                '🔄 обновлено: ' + scheduleData.last_update;
        }
        document.getElementById('genTime').textContent = 
            '📅 ' + new Date().toLocaleString('ru-RU');
    }

    // ===== РЕНДЕРИНГ РАСПИСАНИЯ =====
    function renderSchedule(data, day) {
        const container = document.getElementById('scheduleTable');
        const lessons = data[day] || [];

        if (!lessons || lessons.length === 0) {
            container.innerHTML = `<div class="no-lessons-msg">📌 Уроков нет на ${DAYS_RU[DAYS.indexOf(day)] || day}</div>`;
            document.getElementById('lessonCount').textContent = '📚 0 уроков';
            return;
        }

        // Группируем уроки по номеру
        const grouped = {};
        lessons.forEach(lesson => {
            const num = lesson.lesson || lesson.num || 0;
            if (num === 0) return;
            
            if (!grouped[num]) {
                grouped[num] = { classes: [], subjects: [], rooms: [] };
            }
            
            if (lesson.class && !grouped[num].classes.includes(lesson.class)) {
                grouped[num].classes.push(lesson.class);
            }
            if (lesson.subject && !grouped[num].subjects.includes(lesson.subject)) {
                grouped[num].subjects.push(lesson.subject);
            }
            if (lesson.room && !grouped[num].rooms.includes(lesson.room)) {
                grouped[num].rooms.push(lesson.room);
            }
        });

        // Определяем текущий урок
        const currentLessonNum = getCurrentLessonNum();

        // Строим таблицу
        let html = `
            <table>
                <thead>
                    <tr>
                        <th>№</th>
                        <th>Время</th>
                        <th>Класс</th>
                        <th>Предмет</th>
                        <th>Кабинет</th>
                    </tr>
                </thead>
                <tbody>
        `;

        let totalLessons = 0;
        const maxLessons = 9;

        for (let i = 1; i <= maxLessons; i++) {
            const item = grouped[i];
            const period = LESSON_PERIODS[i - 1] || {start:'--:--',end:'--:--'};
            const isEmpty = !item || item.classes.length === 0;

            if (!isEmpty) totalLessons++;

            const isCurrent = (i === currentLessonNum && !isEmpty);
            const rowClass = isCurrent ? ' class="current"' : '';

            const classesDisplay = isEmpty ? '—' : item.classes.join(', ');
            const subjectsDisplay = isEmpty ? '—' : item.subjects.join(', ');
            const roomsDisplay = isEmpty ? '—' : item.rooms.join(', ');

            html += `
                <tr${rowClass}>
                    <td class="num">${i}</td>
                    <td class="period">
                        <div class="time-start">${period.start}</div>
                        <div class="time-end">${period.end}</div>
                    </td>
                    <td class="class">${classesDisplay}</td>
                    <td class="subject">${subjectsDisplay}</td>
                    <td class="room">${roomsDisplay}</td>
                </tr>
            `;
        }

        html += '</tbody></table>';
        container.innerHTML = html;

        const lessonWord = getLessonWord(totalLessons);
        document.getElementById('lessonCount').textContent = 
            `📚 ${totalLessons} ${lessonWord}`;
    }

    function showError(message) {
        document.getElementById('scheduleTable').innerHTML = 
            `<div class="no-lessons-msg">${message}</div>`;
        document.getElementById('teacherName').textContent = '📋 Ошибка';
    }

    // ===== ОБРАБОТЧИК СМЕНЫ УЧИТЕЛЯ =====
    function onTeacherChange() {
        const select = document.getElementById('teacherSelect');
        const selectedValue = select.value;
        
        if (!selectedValue) {
            document.getElementById('scheduleTable').innerHTML = 
                '<div class="no-lessons-msg">👨‍🏫 Выберите учителя</div>';
            document.getElementById('teacherName').textContent = '📋 Выберите учителя';
            return;
        }

        // Находим учителя в списке
        const teacher = teachersList.find(t => 
            (t.id && t.id === selectedValue) || 
            (t.name && t.name === selectedValue)
        );

        if (teacher) {
            currentTeacher = teacher;
            loadTeacherSchedule(teacher);
            
            // Обновляем URL
            const url = new URL(window.location);
            url.searchParams.set('teacher', teacher.name);
            window.history.pushState({}, '', url);
        }
    }

    // ===== ОБНОВЛЕНИЕ ДАННЫХ =====
    window.refreshData = function() {
        if (currentTeacher) {
            loadTeacherSchedule(currentTeacher);
        } else {
            loadTeachersList();
        }
    };

    // ===== АВТООБНОВЛЕНИЕ =====
    function startAutoRefresh() {
        setInterval(() => {
            if (currentTeacher) {
                loadTeacherSchedule(currentTeacher);
            } else {
                loadTeachersList();
            }
        }, 240000); // 4 минуты
    }

    // ===== ЗАПУСК =====
    document.addEventListener('DOMContentLoaded', function() {
        // Загружаем список учителей
        loadTeachersList();

        // Обработчик смены учителя
        document.getElementById('teacherSelect').addEventListener('change', onTeacherChange);

        // Автообновление
        startAutoRefresh();

        // Обновление при возврате на страницу
        window.addEventListener('pageshow', function(e) {
            if (e.persisted) {
                if (currentTeacher) {
                    loadTeacherSchedule(currentTeacher);
                } else {
                    loadTeachersList();
                }
            }
        });
    });

})();
</script>

</body>
</html>
