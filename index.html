<!DOCTYPE html>
<html lang="ru" data-version="v3.9.9">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Расписание 5-11</title>
    
    <!-- PWA Мета-теги -->
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#2b6cb0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="/icon-512.png">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #f0f4f8;
            font-family: 'Segoe UI', Arial, sans-serif;
        }
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 4px;
        }

        .container {
            width: 100%;
            height: 99vh;
            max-width: 1900px;
            background: #ffffff;
            border-radius: 16px;
            padding: 8px 12px;
            border: 1px solid #d0d7e0;
            display: flex;
            flex-direction: column;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.08);
        }

        .header {
            flex-shrink: 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #e2e8f0;
            padding-bottom: 4px;
            flex-wrap: wrap;
            gap: 4px;
            min-height: 44px;
        }
        .header-left {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
            flex: 1;
            min-width: 0;
        }

        .header-banner {
            height: 40px;
            max-height: 40px;
            min-height: 40px;
            max-width: 800px;
            min-width: 60px;
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f7fafc;
            overflow: hidden;
            flex-shrink: 1;
            padding: 0 6px;
            border: 1px solid #e2e8f0;
            border-radius: 0;
        }
        .header-banner img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .header-center {
            display: flex;
            align-items: center;
            gap: 6px;
            flex-shrink: 0;
            justify-content: center;
        }
        .header-center .day-indicator {
            color: #fff;
            font-weight: 600;
            background: #2b6cb0;
            padding: 1px 12px;
            border-radius: 16px;
            flex-shrink: 0;
        }
        .header-center .divider {
            color: #e2e8f0;
            font-weight: 300;
        }

        .header-right {
            text-align: right;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 1px;
            flex-shrink: 0;
        }
        .header-right .time {
            color: #2b6cb0;
            font-weight: 700;
        }
        .header-right .period {
            color: #e65100;
            font-weight: 600;
            min-height: 1.8em;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            line-height: 1.1;
        }
        .header-right .period .line1 {
            display: block;
        }
        .header-right .period .line2 {
            display: block;
            font-weight: 500;
            color: #d45c00;
        }
        .header-right .date {
            color: #4a5568;
            font-weight: 600;
            margin-top: 1px;
        }
        .header-right .schedule-updated {
            color: #718096;
            font-weight: 500;
            background: #edf2f7;
            padding: 0 8px;
            border-radius: 10px;
            font-size: 0.75rem;
            margin-top: 1px;
        }
        .header-right .schedule-updated.error {
            color: #e53e3e;
            background: #fff5f5;
        }

        /* Кнопка подписки в хедере */
        .subscribe-btn {
            padding: 2px 12px;
            border: none;
            border-radius: 16px;
            cursor: pointer;
            font-size: 0.7rem;
            font-weight: 600;
            transition: all 0.2s;
            background: #2b6cb0;
            color: #ffffff;
            white-space: nowrap;
            margin-top: 1px;
        }
        .subscribe-btn:hover {
            opacity: 0.85;
            transform: scale(1.02);
        }
        .subscribe-btn.subscribed {
            background: #38a169;
        }
        .subscribe-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .main-layout {
            flex: 1;
            display: flex;
            gap: 8px;
            min-height: 0;
            margin-top: 2px;
        }

        .table-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-height: 0;
            overflow: hidden;
        }

        table {
            width: 100%;
            height: 100%;
            border-collapse: collapse;
            table-layout: fixed;
        }

        thead th,
        tbody td {
            border-right: 1.5px solid #d0d7e0;
        }
        thead th:last-child,
        tbody td:last-child {
            border-right: none;
        }

        thead th {
            background: #edf2f7;
            color: #1a365d;
            font-weight: 700;
            text-align: center;
            border-bottom: 2px solid #2b6cb0;
            text-transform: uppercase;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        thead th:first-child {
            width: 2%;
            min-width: 30px;
        }
        thead th:not(:first-child) {
            width: 5.4%;
        }

        tbody td {
            color: #2d3748;
            border-bottom: 1px solid #e2e8f0;
            vertical-align: middle;
            text-align: center;
            word-wrap: break-word !important;
            word-break: break-word !important;
            white-space: normal !important;
            overflow-wrap: break-word !important;
            hyphens: auto !important;
            line-height: 1.2;
        }
        tbody tr:nth-child(even) {
            background: #f7fafc;
        }
        tbody tr:nth-child(odd) {
            background: #ffffff;
        }

        tbody tr.current-lesson {
            background: #bee3f8 !important;
        }
        tbody tr.current-lesson td {
            color: #1a365d;
            font-weight: 600;
        }
        tbody tr.current-lesson .lesson-num {
            color: #2b6cb0;
        }

        .lesson-num {
            font-weight: 700;
            color: #4a5568;
        }

        .subject {
            display: block;
            font-weight: 500;
            line-height: 1.2;
            color: #2d3748;
            word-wrap: break-word !important;
            word-break: break-word !important;
            white-space: normal !important;
            overflow-wrap: break-word !important;
            hyphens: auto !important;
        }

        .cabinet {
            color: #e65100;
            display: block;
            font-weight: 700;
            margin-top: 1px;
        }

        .empty-cell {
            color: #cbd5e0;
        }

        .mobile-view {
            display: none;
            flex-direction: column;
            gap: 4px;
            padding: 2px 0;
            overflow-y: auto;
            height: 100%;
        }

        .mobile-class-card {
            background: #ffffff;
            border-radius: 6px;
            border: 1px solid #e2e8f0;
            overflow: hidden;
            flex-shrink: 0;
        }

        .mobile-class-header {
            background: #edf2f7;
            font-weight: 700;
            color: #1a365d;
            border-bottom: 2px solid #2b6cb0;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .mobile-lesson-card {
            display: flex;
            align-items: center;
            gap: 6px;
            border-bottom: 1px solid #f0f4f8;
            transition: all 0.2s;
        }

        .mobile-lesson-card:last-child {
            border-bottom: none;
        }

        .mobile-lesson-card.current {
            background: #bee3f8;
        }

        .mobile-lesson-card .lesson-num-mobile {
            font-weight: 700;
            color: #4a5568;
            text-align: center;
            flex-shrink: 0;
        }

        .mobile-lesson-card.current .lesson-num-mobile {
            color: #2b6cb0;
        }

        .mobile-lesson-card .lesson-info {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 1px;
            min-width: 0;
        }

        .mobile-lesson-card .lesson-info .subject-name {
            font-weight: 500;
            color: #2d3748;
            word-wrap: break-word;
            word-break: break-word;
            white-space: normal;
        }

        .mobile-lesson-card .lesson-info .subject-name.empty {
            color: #a0aec0;
            font-style: italic;
        }

        .mobile-lesson-card .lesson-info .room-name {
            font-weight: 700;
            color: #e65100;
        }

        .mobile-lesson-card .lesson-time {
            color: #718096;
            white-space: nowrap;
            text-align: right;
            flex-shrink: 0;
        }

        .mobile-lesson-card.current .lesson-time {
            color: #2b6cb0;
            font-weight: 600;
        }

        .footer {
            flex-shrink: 0;
            margin-top: 2px;
            color: #a0aec0;
            text-align: center;
            border-top: 1px solid #e2e8f0;
            padding-top: 2px;
            font-size: 0.7rem;
        }
        .footer .version {
            font-weight: 600;
            color: #4a5568;
        }

        .loading-overlay {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100%;
            color: #4a5568;
            font-weight: 300;
            flex-direction: column;
            gap: 6px;
        }
        .loading-overlay .sub {
            font-size: 0.6em;
            color: #a0aec0;
        }

        /* Уведомление */
        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 12px 20px;
            background: #ffffff;
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            box-shadow: 0 3px 15px rgba(0, 0, 0, 0.1);
            transform: translateX(450px);
            transition: transform 0.3s;
            z-index: 3000;
            color: #2d3748;
            max-width: 400px;
        }
        .notification.show {
            transform: translateX(0);
        }
        .notification.success {
            border-left: 4px solid #38a169;
        }
        .notification.error {
            border-left: 4px solid #e53e3e;
        }
        .notification.info {
            border-left: 4px solid #2b6cb0;
        }
        .notification.warning {
            border-left: 4px solid #d69e2e;
        }

        #pwaNotification {
            display: none;
            background: #ebf8ff;
            border: 1px solid #2b6cb0;
            border-radius: 8px;
            padding: 8px 14px;
            margin: 4px 0;
            text-align: center;
        }
        #pwaNotification p {
            margin: 0;
            color: #2b6cb0;
            font-size: 0.85rem;
        }
        #pwaNotification .small {
            font-size: 0.75rem;
        }

        @media (min-width: 769px) and (max-width: 1024px) {
            .header-banner { height: 36px; max-height: 36px; min-height: 36px; }
            .header-center .day-indicator { font-size: clamp(14px, 1.6vh, 19px); padding: 2px 12px; }
            .header-center .divider { font-size: clamp(14px, 1.6vh, 19px); }
            .header-right .time { font-size: clamp(15px, 1.7vh, 20px); }
            .header-right .period { font-size: clamp(9px, 1.0vh, 12px); }
            .header-right .date { font-size: clamp(12px, 1.3vh, 16px); }
            .header-right .schedule-updated { font-size: clamp(7px, 0.7vh, 10px); }
            .subscribe-btn { font-size: clamp(6px, 0.6vh, 9px); padding: 1px 8px; }
            table { font-size: clamp(10px, 1.0vh, 14px); }
            thead th { font-size: clamp(8px, 0.8vh, 11px); padding: 0.25vh 4px; }
            thead th:first-child { min-width: 25px; }
            tbody td { font-size: clamp(8px, 0.9vh, 12px) !important; padding: 0.25vh 4px; }
            .lesson-num { font-size: clamp(9px, 1.0vh, 13px) !important; }
            .subject { font-size: clamp(8px, 0.9vh, 12px) !important; }
            .cabinet { font-size: inherit !important; }
            .footer { font-size: clamp(7px, 0.7vh, 10px); }
        }

        @media (min-width: 1025px) and (max-width: 1600px) {
            .header-banner { height: 32px; max-height: 32px; min-height: 32px; }
            .header-center .day-indicator { font-size: clamp(13px, 1.4vh, 17px); padding: 1px 10px; }
            .header-center .divider { font-size: clamp(13px, 1.4vh, 17px); }
            .header-right .time { font-size: clamp(14px, 1.6vh, 19px); }
            .header-right .period { font-size: clamp(9px, 0.9vh, 12px); }

            .header-right .schedule-updated { font-size: clamp(7px, 0.7vh, 10px); }
            .subscribe-btn { font-size: clamp(6px, 0.6vh, 9px); padding: 1px 8px; }
            table { font-size: clamp(10px, 1.0vh, 13px); }
            thead th { font-size: clamp(8px, 0.8vh, 11px); padding: 0.2vh 4px; }
            thead th:first-child { min-width: 28px; }
            tbody td { font-size: clamp(8px, 0.9vh, 12px) !important; padding: 0.2vh 3px; }
            .lesson-num { font-size: clamp(9px, 1.0vh, 12px) !important; }
            .subject { font-size: clamp(8px, 0.9vh, 12px) !important; }
            .cabinet { font-size: inherit !important; }
            .footer { font-size: clamp(7px, 0.7vh, 10px); }
        }

        @media (min-width: 1601px) and (max-width: 1919px) {
            .container { padding: 10px 16px; }
            .header-banner { height: 44px; max-height: 44px; min-height: 44px; }
            .header-center .day-indicator { font-size: clamp(17px, 1.8vh, 24px); padding: 2px 16px; border-radius: 20px; }
            .header-center .divider { font-size: clamp(17px, 1.8vh, 24px); }
            .header-right .time { font-size: clamp(18px, 2.0vh, 26px); }
            .header-right .period { font-size: clamp(11px, 1.1vh, 15px); min-height: 2.0em; }

            .header-right .schedule-updated { font-size: clamp(9px, 0.9vh, 12px); }
            .subscribe-btn { font-size: clamp(8px, 0.8vh, 11px); padding: 2px 10px; }
            table { font-size: clamp(12px, 1.2vh, 17px); }
            thead th { font-size: clamp(10px, 1.0vh, 14px); padding: 0.35vh 6px; border-bottom: 2.5px solid #2b6cb0; }
            thead th:first-child { min-width: 32px; }
            tbody td { font-size: clamp(10px, 1.1vh, 15px) !important; padding: 0.35vh 5px; border-bottom: 1.5px solid #e2e8f0; }
            .lesson-num { font-size: clamp(11px, 1.2vh, 16px) !important; }
            .subject { font-size: clamp(10px, 1.1vh, 15px) !important; }
            .cabinet { font-size: inherit !important; margin-top: 2px; }
            .footer { font-size: clamp(9px, 0.9vh, 13px); padding-top: 3px; margin-top: 3px; }
            .main-layout { gap: 10px; margin-top: 3px; }
        }

        @media (min-width: 1920px) and (max-width: 2560px) {
            .container {
                padding: 17px 25px;
                border-radius: 25px;
            }

            .header {
                min-height: 64px;
                gap: 7px;
                padding-bottom: 7px;
                border-bottom-width: 2.8px;
            }

            .header-banner {
                height: 64px;
                max-height: 64px;
                min-height: 64px;
                max-width: 990px;
            }

            .header-center .day-indicator {
                font-size: clamp(23.5px, 2.55vh, 37.5px);
                padding: 4.5px 23px;

            }
            .header-center .divider {
                font-size: clamp(23.5px, 2.55vh, 37.5px);
            }

            .header-right .time {
                font-size: clamp(23.5px, 2.75vh, 39.5px);
            }
            .header-right .period {
                font-size: clamp(13.5px, 1.45vh, 20.5px);
                min-height: 2.5em;
            }
            .header-right .period .line1 {
                font-size: 1em;
            }
            .header-right .period .line2 {
                font-size: 0.85em;
            }
            .header-right .date {
                font-size: clamp(17.5px, 1.85vh, 25.5px);
            }
            .header-right .schedule-updated {
                font-size: clamp(10px, 1.0vh, 14px);
                padding: 0 12px;
                border-radius: 12px;
            }

            }

            }

            }

        @media (min-width: 2561px) {

        @media (max-width: 768px) {

            .mobile-lesson-card .lesson-info .subject-name { font-size: 16.5px; }

        @media (max-width: 400px) {
            .container { padding: 3.5px 3.5px; }

            } catch (e) {}
            return null;

        function saveSubscription(subscription) {
            try {
                var subData = {
                    endpoint: subscription.endpoint,
                    keys: {
                        p256dh: btoa(String.fromCharCode.apply(null, new Uint8Array(subscription.getKey('p256dh')))),
                        auth: btoa(String.fromCharCode.apply(null, new Uint8Array(subscription.getKey('auth'))))
                    }
                };
                localStorage.setItem('pushSubscription', JSON.stringify(subData));

                return false;
            }

        function urlBase64ToUint8Array(base64String) {
            var padding = '='.repeat((4 - base64String.length % 4) % 4);
            var base64 = (base64String + padding).replace(/\-/g, '+').replace(/_/g, '/');
            var rawData = window.atob(base64);
            var outputArray = new Uint8Array(rawData.length);
            for (var i = 0; i < rawData.length; ++i) {
                outputArray[i] = rawData.charCodeAt(i);
            }
            return outputArray;
        }

        function registerServiceWorker() {

        function updateSubscribeButton() {

        function showNotificationMessage(message, type) {
            if (type === undefined) type = 'info';

        async function toggleSubscription() {
            var btn = document.getElementById('subscribeBtn');
            if (!btn) return;
            
            // Проверяем поддержку
            if (!('serviceWorker' in navigator) || !('PushManager' in window)) {
                showNotificationMessage('❌ Ваш браузер не поддерживает пуш-уведомления', 'error');
                return;
            }

            // Проверяем, подписаны ли уже
            var isSubscribed = getSavedSubscription() !== null;
            
            if (isSubscribed) {
                // Отписываемся
                try {
                    btn.disabled = true;
                    btn.textContent = '⏳ Отписка...';
                    
                    var registration = await navigator.serviceWorker.ready;
                    var subscription = await registration.pushManager.getSubscription();
                    if (subscription) {
                        await subscription.unsubscribe();
                    }
                    removeSubscription();
                    updateSubscribeButton();
                    showNotificationMessage('✅ Вы отписались от уведомлений', 'success');
                } catch (error) {
                    console.error('Ошибка отписки:', error);
                    showNotificationMessage('❌ Ошибка: ' + error.message, 'error');
                } finally {
                    btn.disabled = false;
                }
                return;
            }

            // Подписываемся
            try {
                btn.disabled = true;
                btn.textContent = '⏳ Подписка...';

                // Проверяем разрешение
                if (Notification.permission === 'denied') {
                    showNotificationMessage('⚠️ Уведомления заблокированы. Разрешите в настройках браузера.', 'warning');
                    btn.disabled = false;
                    updateSubscribeButton();
                    return;
                }

                // Запрашиваем разрешение
                if (Notification.permission !== 'granted') {
                    var permission = await Notification.requestPermission();
                    if (permission !== 'granted') {
                        showNotificationMessage('⚠️ Разрешение на уведомления не получено', 'warning');
                        btn.disabled = false;
                        updateSubscribeButton();
                        return;
                    }
                }

                var registration = await navigator.serviceWorker.ready;
                
                // Проверяем существующую подписку
                var existingSubscription = await registration.pushManager.getSubscription();
                if (existingSubscription) {
                    saveSubscription(existingSubscription);
                    updateSubscribeButton();
                    showNotificationMessage('✅ Вы уже подписаны на уведомления', 'success');
                    btn.disabled = false;
                    return;
                }

                // Создаём новую подписку
                var subscription = await registration.pushManager.subscribe({
                    userVisibleOnly: true,
                    applicationServerKey: urlBase64ToUint8Array(VAPID_PUBLIC_KEY)
                });

                saveSubscription(subscription);
                updateSubscribeButton();
                showNotificationMessage('✅ Вы подписаны на уведомления!', 'success');

                // Отправляем тестовое уведомление

        // ================================================================
        // АНАЛОГОВЫЕ ЧАСЫ С ПОВОРОТОМ НА 45° ПРОТИВ ЧАСОВОЙ СТРЕЛКИ
        // ================================================================
        function initRotatedClock(containerId) {
            var container = document.getElementById(containerId);
            if (!container) return;

            // Очищаем контейнер
            container.innerHTML = '';

            // Создаём обёртку
            var wrapper = document.createElement('div');
            wrapper.className = 'clock-wrapper';
            wrapper.style.cssText = 'display:flex;align-items:center;gap:12px;';

            // --- СОЗДАЁМ SVG ---
            var svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
            svg.setAttribute('viewBox', '0 0 100 100');
            svg.setAttribute('width', '60');
            svg.setAttribute('height', '60');

            // === ГРУППА ДЛЯ ПОВОРОТА ЦИФЕРБЛАТА НА 45° ПРОТИВ ЧАСОВОЙ СТРЕЛКИ ===
            var g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
            g.setAttribute('transform', 'rotate(-45, 50, 50)');

            // Фон циферблата
            var circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
            circle.setAttribute('cx', '50');
            circle.setAttribute('cy', '50');
            circle.setAttribute('r', '45');
            circle.setAttribute('fill', '#f7fafc');
            circle.setAttribute('stroke', '#2b6cb0');
            circle.setAttribute('stroke-width', '3');
            g.appendChild(circle);

            // Метки часов (1-12)
            for (var i = 1; i <= 12; i++) {
                var angle = (i / 12) * 2 * Math.PI - Math.PI / 2;
                var x1 = 50 + 38 * Math.cos(angle);
                var y1 = 50 + 38 * Math.sin(angle);
                var x2 = 50 + 32 * Math.cos(angle);
                var y2 = 50 + 32 * Math.sin(angle);
                
                var line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                line.setAttribute('x1', x1);
                line.setAttribute('y1', y1);
                line.setAttribute('x2', x2);
                line.setAttribute('y2', y2);
                line.setAttribute('stroke', '#2d3748');
                line.setAttribute('stroke-width', i % 3 === 0 ? '3' : '1.5');
                line.setAttribute('stroke-linecap', 'round');
                g.appendChild(line);
            }

            svg.appendChild(g);

            // === СТРЕЛКИ (не поворачиваются) ===
            // Часовая стрелка
            var hourHand = document.createElementNS('http://www.w3.org/2000/svg', 'line');
            hourHand.setAttribute('x1', '50');
            hourHand.setAttribute('y1', '50');
            hourHand.setAttribute('x2', '50');
            hourHand.setAttribute('y2', '28');
            hourHand.setAttribute('stroke', '#2b6cb0');
            hourHand.setAttribute('stroke-width', '4');
            hourHand.setAttribute('stroke-linecap', 'round');
            hourHand.setAttribute('id', 'hour-hand');
            svg.appendChild(hourHand);

            // Минутная стрелка
            var minHand = document.createElementNS('http://www.w3.org/2000/svg', 'line');
            minHand.setAttribute('x1', '50');
            minHand.setAttribute('y1', '50');
            minHand.setAttribute('x2', '50');
            minHand.setAttribute('y2', '18');
            minHand.setAttribute('stroke', '#2b6cb0');
            minHand.setAttribute('stroke-width', '3');
            minHand.setAttribute('stroke-linecap', 'round');
            minHand.setAttribute('id', 'min-hand');
            svg.appendChild(minHand);

            // Центр
            var center = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
            center.setAttribute('cx', '50');
            center.setAttribute('cy', '50');
            center.setAttribute('r', '4');
            center.setAttribute('fill', '#2b6cb0');
            svg.appendChild(center);

            wrapper.appendChild(svg);

            // === ЦИФРОВОЕ ВРЕМЯ ===
            var textBlock = document.createElement('div');
            textBlock.className = 'clock-text';
            textBlock.style.cssText = 'display:flex;flex-direction:column;align-items:flex-start;white-space:nowrap;';

            // День недели
            var daySpan = document.createElement('span');
            daySpan.className = 'day';
            daySpan.style.cssText = 'font-size:0.7em;color:#4a5568;font-weight:500;';
            var days = ['Воскресенье', 'Понедельник', 'Вторник', 'Среда', 'Четверг', 'Пятница', 'Суббота'];
            daySpan.textContent = days[new Date().getDay()];
            textBlock.appendChild(daySpan);

            // Дата
            var dateSpan = document.createElement('span');
            dateSpan.className = 'date';
            dateSpan.style.cssText = 'font-size:0.85em;color:#2d3748;font-weight:600;';
            dateSpan.textContent = new Date().toLocaleDateString('ru-RU', {
                day: '2-digit',
                month: 'long',
                year: 'numeric'
            });
            textBlock.appendChild(dateSpan);

            // Цифровое время (с секундами)
            var digitalSpan = document.createElement('span');
            digitalSpan.className = 'digital-time';
            digitalSpan.id = 'digital-time';
            digitalSpan.style.cssText = 'font-size:1.1em;color:#2b6cb0;font-weight:700;font-variant-numeric:tabular-nums;';
            digitalSpan.textContent = new Date().toLocaleTimeString('ru-RU', {
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit'
            });
            textBlock.appendChild(digitalSpan);

            wrapper.appendChild(textBlock);
            container.appendChild(wrapper);

            // === ОБНОВЛЕНИЕ ЧАСОВ ===
            function updateClock() {
                var now = new Date();
                var hours = now.getHours() % 12;
                var minutes = now.getMinutes();
                var seconds = now.getSeconds();

                // Углы поворота стрелок
                var hourAngle = (hours * 30) + (minutes * 0.5) - 90;
                var minAngle = (minutes * 6) + (seconds * 0.1) - 90;

                var hourHandEl = document.getElementById('hour-hand');
                var minHandEl = document.getElementById('min-hand');

                if (hourHandEl) {
                    hourHandEl.setAttribute('transform', 'rotate(' + hourAngle + ', 50, 50)');
                }
                if (minHandEl) {
                    minHandEl.setAttribute('transform', 'rotate(' + minAngle + ', 50, 50)');
                }

                // Обновляем цифровое время
                var digitalEl = document.getElementById('digital-time');
                if (digitalEl) {
                    digitalEl.textContent = now.toLocaleTimeString('ru-RU', {
                        hour: '2-digit',
                        minute: '2-digit',
                        second: '2-digit'
                    });
                }

                // Обновляем день и дату
                var dayEl = textBlock.querySelector('.day');
                if (dayEl) {
                    dayEl.textContent = days[now.getDay()];
                }
                var dateEl = textBlock.querySelector('.date');
                if (dateEl) {
                    dateEl.textContent = now.toLocaleDateString('ru-RU', {
                        day: '2-digit',
                        month: 'long',
                        year: 'numeric'
                    });
                }
            }

            updateClock();
            setInterval(updateClock, 1000);
        }

        // ================================================================
        // ОСНОВНАЯ ЛОГИКА РАСПИСАНИЯ
        // ================================================================

        function parseTime(timeStr) {
            var parts = timeStr.split(':');
            return parseInt(parts[0]) * 60 + parseInt(parts[1]);
        }

        function formatMinutes(minutes) {
            if (minutes === undefined || minutes === null) return '0 мин';
            var rounded = Math.ceil(minutes);
            if (rounded <= 0) return '0 мин';
            if (rounded >= 60) {
                var hours = Math.floor(rounded / 60);
                var mins = rounded % 60;
                if (mins === 0) return hours + ' ч';
                return hours + ' ч ' + mins + ' мин';
            }
            return rounded + ' мин';
        }

        function getCurrentPeriodInfo() {
            var now = new Date();
            var totalMinutes = now.getHours() * 60 + now.getMinutes();

            for (var i = 0; i < LESSON_TIMES.length; i++) {
                var lesson = LESSON_TIMES[i];
                var startMin = parseTime(lesson.start);
                var endMin = parseTime(lesson.end);

                if (totalMinutes >= startMin && totalMinutes < endMin) {
                    return {
                        type: 'lesson',
                        num: lesson.num,
                        start: lesson.start,
                        end: lesson.end
                    };
                }
            }

            for (var i = 0; i < LESSON_TIMES.length; i++) {
                var lesson = LESSON_TIMES[i];
                var startMin = parseTime(lesson.start);

                if (i > 0) {
                    var prevEndMin = parseTime(LESSON_TIMES[i - 1].end);
                    if (totalMinutes >= prevEndMin && totalMinutes < startMin) {
                        var diff = startMin - totalMinutes;
                        return {
                            type: 'break',
                            nextLesson: lesson.num,
                            nextStart: lesson.start,
                            remaining: diff
                        };
                    }
                }

                if (i === 0 && totalMinutes < startMin) {
                    var diff = startMin - totalMinutes;
                    return {
                        type: 'before',
                        nextLesson: lesson.num,
                        nextStart: lesson.start,
                        remaining: diff
                    };
                }
            }

            var lastEndMin = parseTime(LESSON_TIMES[LESSON_TIMES.length - 1].end);
            if (totalMinutes >= lastEndMin) {
                return { type: 'after' };
            }

            return { type: 'unknown' };
        }

        function getPeriodName() {
            var info = getCurrentPeriodInfo();

            if (info.type === 'lesson') {
                return '📖 ' + info.num + '-й урок (' + info.start + '–' + info.end + ')';
            }

            if (info.type === 'break') {
                if (info.remaining <= 0) {
                    return '⏰ ' + info.nextLesson + '-й урок начинается';
                }
                return '⏳ До ' + info.nextLesson + '-го урока ' + formatMinutes(info.remaining);
            }

            if (info.type === 'before') {
                if (info.remaining <= 0) {
                    return '⏰ ' + info.nextLesson + '-й урок начинается';
                }
                return '⏳ До начала занятий ' + formatMinutes(info.remaining);
            }

            if (info.type === 'after') {
                var today = new Date();
                var dayNum = today.getDay();
                var nextDayNum = dayNum + 1;
                if (nextDayNum === 7) nextDayNum = 1;
                if (nextDayNum === 0) nextDayNum = 1;
                var nextDayFull = DAYS_FULL[nextDayNum] || 'Понедельник';
                var dayGenitive = {
                    'Понедельник': 'понедельник',
                    'Вторник': 'вторник',
                    'Среда': 'среду',
                    'Четверг': 'четверг',
                    'Пятница': 'пятницу',
                    'Суббота': 'субботу',
                    'Воскресенье': 'воскресенье'
                };
                var nextDayGen = dayGenitive[nextDayFull] || nextDayFull.toLowerCase();
                return '<span class="line1">📌 Изменения</span><div class="line2">на ' + nextDayGen + '</div>';
            }

            return '⏰ Загрузка...';
        }

        function getDisplayDay() {
            var now = new Date();
            var dayNum = now.getDay();
            if (dayNum === 0) dayNum = 1;
            return {
                key: DAYS_SHORT[dayNum] || "ПН",
                full: DAYS_FULL[dayNum] || "Понедельник"
            };
        }

        function getTargetDay() {
            var now = new Date();
            var dayNum = now.getDay();
            var hours = now.getHours();
            var minutes = now.getMinutes();
            var totalMinutes = hours * 60 + minutes;

            var shift = (totalMinutes >= 17 * 60) ? 1 : 0;
            var targetDayNum = dayNum + shift;

            if (targetDayNum === 0) targetDayNum = 1;
            if (targetDayNum > 6) targetDayNum = 1;

            var dayKey = DAYS_SHORT[targetDayNum] || "ПН";
            var dayFull = DAYS_FULL[targetDayNum] || "Понедельник";

            if (weekDays[dayKey] && Object.keys(weekDays[dayKey]).length > 0) {
                return { key: dayKey, full: dayFull };
            }

            for (var i = 0; i < DAYS_LIST.length; i++) {
                var d = DAYS_LIST[i];
                if (weekDays[d] && Object.keys(weekDays[d]).length > 0) {
                    return { key: d, full: DAYS_FULL[DAYS_LIST.indexOf(d) + 1] || d };
                }
            }

            return { key: "ПН", full: "Понедельник" };
        }

        function formatDateForDisplay(dateValue) {
            if (!dateValue) return null;
            var d;
            if (typeof dateValue === 'string') {
                d = new Date(dateValue);
            } else if (typeof dateValue === 'number') {
                d = new Date(dateValue);
            } else if (dateValue instanceof Date) {
                d = dateValue;
            } else {
                return null;
            }
            if (isNaN(d.getTime())) return null;
            return d.toLocaleDateString('ru-RU', {
                day: '2-digit',
                month: '2-digit',
                year: 'numeric',
                hour: '2-digit',
                minute: '2-digit'
            });
        }

        function loadData() {
            var statusEl = document.getElementById('loadStatus');
            var statusMobile = document.getElementById('loadStatusMobile');
            if (statusEl) statusEl.textContent = 'Загрузка data.json...';
            if (statusMobile) statusMobile.textContent = 'Загрузка data.json...';

            fetch('data.json?t=' + Date.now())
                .then(function(res) {
                    if (!res.ok) throw new Error('data.json не найден (код ' + res.status + ')');
                    return res.json();
                })
                .then(function(data) {
                    var scheduleData = null;
                    var updatedDate = null;

                    if (data.updated) {
                        updatedDate = data.updated;
                    } else if (data.last_update) {
                        updatedDate = data.last_update;
                    } else if (data.meta && data.meta.updated) {
                        updatedDate = data.meta.updated;
                    }

                    if (updatedDate) {
                        var formatted = formatDateForDisplay(updatedDate);
                        if (formatted) {
                            scheduleUpdatedDate = formatted;
                            document.getElementById('scheduleUpdated').textContent = '📅 ' + formatted;
                            document.getElementById('scheduleUpdated').className = 'schedule-updated';
                        } else {
                            scheduleUpdatedDate = null;
                            document.getElementById('scheduleUpdated').textContent = '📅 дата не указана';
                            document.getElementById('scheduleUpdated').className = 'schedule-updated error';
                        }
                    } else {
                        scheduleUpdatedDate = null;
                        document.getElementById('scheduleUpdated').textContent = '📅 дата не указана';
                        document.getElementById('scheduleUpdated').className = 'schedule-updated error';
                    }

                    if (data.schedule) {
                        if (data.schedule.primary) {
                            scheduleData = data.schedule.primary;
                        } else {
                            scheduleData = data.schedule;
                        }
                    } else if (data.primary) {
                        scheduleData = data.primary;
                    } else {
                        scheduleData = data;
                    }

                    var hasDays = false;
                    DAYS_LIST.forEach(function(day) {
                        if (scheduleData && scheduleData[day]) {
                            hasDays = true;
                            var filtered = {};
                            Object.keys(scheduleData[day]).forEach(function(cls) {
                                if (PRIMARY_CLASSES.indexOf(cls) !== -1) {
                                    filtered[cls] = scheduleData[day][cls];
                                }
                            });
                            if (Object.keys(filtered).length > 0) {
                                weekDays[day] = filtered;
                            } else {
                                weekDays[day] = {};
                            }
                        }
                    });

                    if (!hasDays) {
                        Object.keys(scheduleData || {}).forEach(function(key) {
                            if (DAYS_LIST.indexOf(key) !== -1) {
                                var filtered = {};
                                Object.keys(scheduleData[key] || {}).forEach(function(cls) {
                                    if (PRIMARY_CLASSES.indexOf(cls) !== -1) {
                                        filtered[cls] = scheduleData[key][cls];
                                    }
                                });
                                if (Object.keys(filtered).length > 0) {
                                    weekDays[key] = filtered;
                                    hasDays = true;
                                } else {
                                    weekDays[key] = {};
                                }
                            }
                        });
                    }

                    if (!hasDays) {
                        DAYS_LIST.forEach(function(day) {
                            weekDays[day] = {};
                        });
                    }

                    DAYS_LIST.forEach(function(day) {
                        if (!weekDays[day]) {
                            weekDays[day] = {};
                        }
                    });

                    if (statusEl) statusEl.textContent = '✅ data.json загружен';
                    if (statusMobile) statusMobile.textContent = '✅ data.json загружен';
                    processLoadedData();
                })
                .catch(function(err) {
                    console.warn('Ошибка загрузки data.json:', err.message);
                    if (statusEl) statusEl.textContent = '❌ ' + err.message;
                    if (statusMobile) statusMobile.textContent = '❌ ' + err.message;
                    DAYS_LIST.forEach(function(day) {
                        weekDays[day] = {};
                    });
                    document.getElementById('scheduleUpdated').textContent = '📅 ошибка загрузки';
                    document.getElementById('scheduleUpdated').className = 'schedule-updated error';
                    processLoadedData();
                });
        }

        function processLoadedData() {
            classNames = PRIMARY_CLASSES;

            DAYS_LIST.forEach(function(day) {
                var dayData = weekDays[day] || {};
                classNames.forEach(function(cls) {
                    if (!dayData[cls]) {
                        dayData[cls] = [];
                        for (var i = 0; i < MAX_LESSONS; i++) {
                            dayData[cls].push(['', '']);
                        }
                    } else {
                        var lessons = dayData[cls];
                        while (lessons.length < MAX_LESSONS) {
                            lessons.push(['', '']);
                        }
                    }
                });
                weekDays[day] = dayData;
            });

            dataLoaded = true;
            renderTable();
            renderMobile();
        }

        function sortClasses(classes) {
            var letters = "АБВГДЕЁЖЗИЙКЛМНОПРСТУФХЦЧШЩЪЫЬЭЮЯ";
            return classes.sort(function(a, b) {
                var numA = parseInt(a.match(/\d+/)?.[0] || 0);
                var numB = parseInt(b.match(/\d+/)?.[0] || 0);
                if (numA !== numB) return numA - numB;
                var lA = a.match(/[А-Я]/)?.[0] || '';
                var lB = b.match(/[А-Я]/)?.[0] || '';
                return letters.indexOf(lA) - letters.indexOf(lB);
            });
        }

        function renderTable() {
            if (!dataLoaded && Object.keys(weekDays).length === 0) return;

            var targetDay = getTargetDay();
            var dayKey = targetDay.key;

            var displayDay = getDisplayDay();
            var displayFull = displayDay.full;

            var currentLesson = 0;
            var info = getCurrentPeriodInfo();
            if (info.type === 'lesson') {
                currentLesson = info.num;
            } else if (info.type === 'break' || info.type === 'before') {
                currentLesson = info.nextLesson - 1;
                if (currentLesson < 0) currentLesson = 0;
            }

            var now = new Date();
            var dateStr = now.toLocaleDateString('ru-RU', {
                day: '2-digit',
                month: '2-digit',
                year: 'numeric'
            });

            document.getElementById('dayIndicator').textContent = displayFull;
            document.getElementById('currentDate').textContent = dateStr;
            document.getElementById('currentPeriod').innerHTML = getPeriodName();

            var dayData = weekDays[dayKey];
            if (!dayData || Object.keys(dayData).length === 0) {
                document.getElementById('scheduleBody').innerHTML =
                    '<tr><td colspan="20" class="loading-overlay">📌 Нет расписания</td></tr>';
                return;
            }

            var classes = Object.keys(dayData).filter(function(cls) {
                return PRIMARY_CLASSES.indexOf(cls) !== -1;
            });

            if (classes.length === 0) {
                classes = PRIMARY_CLASSES;
            }
            classes = sortClasses(classes);

            var headerHTML = '<tr><th></th>';
            classes.forEach(function(cls) { headerHTML += '<th>' + cls + '</th>'; });
            headerHTML += '</tr>';
            document.getElementById('tableHead').innerHTML = headerHTML;

            var bodyHTML = '';
            for (var lessonNum = 1; lessonNum <= MAX_LESSONS; lessonNum++) {
                var idx = lessonNum - 1;
                var isCurrent = (lessonNum === currentLesson && currentLesson >= 1 && currentLesson <= MAX_LESSONS);
                bodyHTML += '<tr class="' + (isCurrent ? 'current-lesson' : '') + '">';
                bodyHTML += '<td><span class="lesson-num">' + lessonNum + '</span></td>';

                classes.forEach(function(cls) {
                    var lessons = dayData[cls] || [];
                    var lesson = lessons[idx] || ['', ''];
                    var subject = '';
                    var cabinet = '';
                    if (Array.isArray(lesson)) {
                        subject = lesson[0] || '';
                        cabinet = lesson[1] || '';
                    } else if (typeof lesson === 'object' && lesson !== null) {
                        subject = lesson.subject || lesson[0] || '';
                        cabinet = lesson.room || lesson[1] || '';
                    }
                    if (subject && subject.trim() !== '') {
                        bodyHTML += '<td><span class="subject">' + subject + '</span><span class="cabinet">' +
                            cabinet + '</span></td>';
                    } else {
                        bodyHTML += '<td class="empty-cell">—</td>';
                    }
                });
                bodyHTML += '</tr>';
            }
            document.getElementById('scheduleBody').innerHTML = bodyHTML;
        }

        function renderMobile() {
            if (!dataLoaded && Object.keys(weekDays).length === 0) return;

            var targetDay = getTargetDay();
            var dayKey = targetDay.key;

            var currentLesson = 0;
            var info = getCurrentPeriodInfo();
            if (info.type === 'lesson') {
                currentLesson = info.num;
            } else if (info.type === 'break' || info.type === 'before') {
                currentLesson = info.nextLesson - 1;
                if (currentLesson < 0) currentLesson = 0;
            }

            var dayData = weekDays[dayKey];
            if (!dayData || Object.keys(dayData).length === 0) {
                document.getElementById('mobileView').innerHTML =
                    '<div style="text-align:center;padding:30px 0;color:#a0aec0;">📌 Нет расписания</div>';
                return;
            }

            var classes = Object.keys(dayData).filter(function(cls) {
                return PRIMARY_CLASSES.indexOf(cls) !== -1;
            });

            if (classes.length === 0) {
                classes = PRIMARY_CLASSES;
            }
            classes = sortClasses(classes);

            var html = '';
            classes.forEach(function(className) {
                var lessons = dayData[className] || [];

                html += '<div class="mobile-class-card">';
                html += '<div class="mobile-class-header">';
                html += '<span class="class-name">' + className + '</span>';
                html += '</div>';

                for (var i = 0; i < MAX_LESSONS; i++) {
                    var lesson = lessons[i] || ['', ''];
                    var subject = Array.isArray(lesson) ? lesson[0] : (lesson.subject || lesson[0] || '');
                    var cabinet = Array.isArray(lesson) ? lesson[1] : (lesson.room || lesson[1] || '');
                    var isCurrent = (i + 1 === currentLesson);

                    var hasContent = subject && subject.trim() !== '';

                    html += '<div class="mobile-lesson-card' + (isCurrent ? ' current' : '') + '">';
                    html += '<span class="lesson-num-mobile">' + (i + 1) + '</span>';

                    if (hasContent) {
                        html += '<div class="lesson-info">';
                        html += '<span class="subject-name">' + subject + '</span>';
                        if (cabinet && cabinet.trim() !== '') {
                            html += '<span class="room-name">' + cabinet + '</span>';
                        }
                        html += '</div>';
                        html += '<span class="lesson-time">' + LESSON_TIMES[i].start + '–' + LESSON_TIMES[i].end +
                        '</span>';
                    } else {
                        html += '<div class="lesson-info">';
                        html += '<span class="subject-name empty">— нет урока —</span>';
                        html += '</div>';
                        html += '<span class="lesson-time">' + LESSON_TIMES[i].start + '–' + LESSON_TIMES[i].end +
                        '</span>';
                    }

                    html += '</div>';
                }

                html += '</div>';
            });

            document.getElementById('mobileView').innerHTML = html;
        }

        function updateTime() {
            var now = new Date();
            document.getElementById('currentTime').textContent =
                now.toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
        }

        function refreshAll() {
            updateTime();
            document.getElementById('currentPeriod').innerHTML = getPeriodName();
            if (dataLoaded || Object.keys(weekDays).length > 0) {
                renderTable();
                renderMobile();
            }
        }

        // ================================================================
        // ИНИЦИАЛИЗАЦИЯ
        // ================================================================
        document.addEventListener('DOMContentLoaded', function() {
            // Инициализируем часы с поворотом на -45°
            initRotatedClock('currentTime');

            // Регистрируем Service Worker
            registerServiceWorker();

            // Обновляем кнопку подписки
            updateSubscribeButton();

            // PWA установка
            window.addEventListener('beforeinstallprompt', function(e) {
                e.preventDefault();
                deferredPrompt = e;
                var pwaNotification = document.getElementById('pwaNotification');
                if (pwaNotification) {
                    pwaNotification.style.display = 'block';
                }
            });

            // Загружаем данные
            loadData();

            // Обновление каждую секунду
            setInterval(refreshAll, 1000);

            // Перезагрузка данных каждые 60 секунд
            setInterval(function() {
                loadData();
            }, 60000);

            console.log('✅ Расписание v' + APP_VERSION + ' загружено!');
            console.log('🔔 Статус подписки:', getSavedSubscription() ? 'Подписано' : 'Не подписано');
        });
    </script>

</body>
