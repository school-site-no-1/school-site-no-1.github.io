<!DOCTYPE html>
<html lang="ru" data-version="v3.9.6">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Расписание 5-11</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #f0f4f8;
            font-family: 'Segoe UI', Arial, sans-serif;
        }
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 4px;
        }

        .container {
            width: 100%;
            height: 99vh;
            max-width: 1900px;
            background: #ffffff;
            border-radius: 16px;
            padding: 8px 12px;
            border: 1px solid #d0d7e0;
            display: flex;
            flex-direction: column;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.08);
        }

        .header {
            flex-shrink: 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #e2e8f0;
            padding-bottom: 4px;
            flex-wrap: wrap;
            gap: 4px;
            min-height: 44px;
        }
        .header-left {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
            flex: 1;
            min-width: 0;
        }

        .header-banner {
            height: 40px;
            max-height: 40px;
            min-height: 40px;
            max-width: 800px;
            min-width: 60px;
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f7fafc;
            overflow: hidden;
            flex-shrink: 1;
            padding: 0 6px;
            border: 1px solid #e2e8f0;
            border-radius: 0;
        }
        .header-banner img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .header-center {
            display: flex;
            align-items: center;
            gap: 6px;
            flex-shrink: 0;
            justify-content: center;
        }
        .header-center .day-indicator {
            color: #fff;
            font-weight: 600;
            background: #2b6cb0;
            padding: 1px 12px;
            border-radius: 16px;
            flex-shrink: 0;
        }
        .header-center .divider {
            color: #e2e8f0;
            font-weight: 300;
        }

        .header-right {
            text-align: right;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 1px;
            flex-shrink: 0;
        }
        .header-right .time {
            color: #2b6cb0;
            font-weight: 700;
        }
        .header-right .period {
            color: #e65100;
            font-weight: 600;
            min-height: 1.8em;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            line-height: 1.1;
        }
        .header-right .period .line1 {
            display: block;
        }
        .header-right .period .line2 {
            display: block;
            font-weight: 500;
            color: #d45c00;
        }
        .header-right .version {
            color: #718096;
            font-weight: 500;
            background: #edf2f7;
            padding: 0 8px;
            border-radius: 10px;
        }
        .header-right .date {
            color: #4a5568;
            font-weight: 600;
            margin-top: 1px;
        }

        .main-layout {
            flex: 1;
            display: flex;
            gap: 8px;
            min-height: 0;
            margin-top: 2px;
        }

        .table-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-height: 0;
            overflow: hidden;
        }

        table {
            width: 100%;
            height: 100%;
            border-collapse: collapse;
            table-layout: fixed;
        }

        thead th,
        tbody td {
            border-right: 1.5px solid #d0d7e0;
        }
        thead th:last-child,
        tbody td:last-child {
            border-right: none;
        }

        thead th {
            background: #edf2f7;
            color: #1a365d;
            font-weight: 700;
            text-align: center;
            border-bottom: 2px solid #2b6cb0;
            text-transform: uppercase;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        /* === ПЕРВЫЙ СТОЛБЕЦ — УМЕНЬШЕН В 2 РАЗА (по сравнению с v3.9.5) === */
        thead th:first-child {
            width: 11px;
            min-width: 11px;
            max-width: 15px;
        }
        @media (min-width: 769px) and (max-width: 1024px) {
            thead th:first-child { width: 9px; min-width: 9px; max-width: 12px; }
        }
        @media (min-width: 1025px) and (max-width: 1600px) {
            thead th:first-child { width: 10px; min-width: 10px; max-width: 13px; }
        }
        @media (min-width: 1601px) and (max-width: 1919px) {
            thead th:first-child { width: 12px; min-width: 12px; max-width: 16px; }
        }
        @media (min-width: 1920px) and (max-width: 2560px) {
            thead th:first-child { width: 15px; min-width: 15px; max-width: 19px; }
        }
        @media (min-width: 2561px) {
            thead th:first-child { width: 17px; min-width: 17px; max-width: 22px; }
        }

        thead th:not(:first-child) {
            width: 5.3%;
        }

        tbody td {
            color: #2d3748;
            border-bottom: 1px solid #e2e8f0;
            vertical-align: middle;
            text-align: center;
            word-wrap: break-word !important;
            word-break: break-word !important;
            white-space: normal !important;
            overflow-wrap: break-word !important;
            hyphens: auto !important;
            line-height: 1.2;
        }
        tbody tr:nth-child(even) {
            background: #f7fafc;
        }
        tbody tr:nth-child(odd) {
            background: #ffffff;
        }

        tbody tr.current-lesson {
            background: #bee3f8 !important;
        }
        tbody tr.current-lesson td {
            color: #1a365d;
            font-weight: 600;
        }
        tbody tr.current-lesson .lesson-num {
            color: #2b6cb0;
        }

        .lesson-num {
            font-weight: 700;
            color: #4a5568;
            font-size: 0.7em;
        }

        .subject {
            display: block;
            font-weight: 500;
            line-height: 1.2;
            color: #2d3748;
            word-wrap: break-word !important;
            word-break: break-word !important;
            white-space: normal !important;
            overflow-wrap: break-word !important;
            hyphens: auto !important;
        }

        .cabinet {
            color: #e65100;
            display: block;
            font-weight: 700;
            margin-top: 1px;
        }

        .empty-cell {
            color: #cbd5e0;
        }

        .mobile-view {
            display: none;
            flex-direction: column;
            gap: 4px;
            padding: 2px 0;
            overflow-y: auto;
            height: 100%;
        }

        .mobile-class-card {
            background: #ffffff;
            border-radius: 6px;
            border: 1px solid #e2e8f0;
            overflow: hidden;
            flex-shrink: 0;
        }

        .mobile-class-header {
            background: #edf2f7;
            font-weight: 700;
            color: #1a365d;
            border-bottom: 2px solid #2b6cb0;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .mobile-lesson-card {
            display: flex;
            align-items: center;
            gap: 6px;
            border-bottom: 1px solid #f0f4f8;
            transition: all 0.2s;
        }

        .mobile-lesson-card:last-child {
            border-bottom: none;
        }

        .mobile-lesson-card.current {
            background: #bee3f8;
        }

        .mobile-lesson-card .lesson-num-mobile {
            font-weight: 700;
            color: #4a5568;
            text-align: center;
            flex-shrink: 0;
        }

        .mobile-lesson-card.current .lesson-num-mobile {
            color: #2b6cb0;
        }

        .mobile-lesson-card .lesson-info {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 1px;
            min-width: 0;
        }

        .mobile-lesson-card .lesson-info .subject-name {
            font-weight: 500;
            color: #2d3748;
            word-wrap: break-word;
            word-break: break-word;
            white-space: normal;
        }

        .mobile-lesson-card .lesson-info .subject-name.empty {
            color: #a0aec0;
            font-style: italic;
        }

        .mobile-lesson-card .lesson-info .room-name {
            font-weight: 700;
            color: #e65100;
        }

        .mobile-lesson-card .lesson-time {
            color: #718096;
            white-space: nowrap;
            text-align: right;
            flex-shrink: 0;
        }

        .mobile-lesson-card.current .lesson-time {
            color: #2b6cb0;
            font-weight: 600;
        }

        .footer {
            flex-shrink: 0;
            margin-top: 2px;
            color: #a0aec0;
            text-align: center;
            border-top: 1px solid #e2e8f0;
            padding-top: 2px;
        }

        .loading-overlay {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100%;
            color: #4a5568;
            font-weight: 300;
            flex-direction: column;
            gap: 6px;
        }
        .loading-overlay .sub {
            font-size: 0.6em;
            color: #a0aec0;
        }

        /* ===== АДАПТАЦИЯ ПОД УСТРОЙСТВА ===== */

        @media (min-width: 769px) and (max-width: 1024px) {
            .header-banner { height: 36px; max-height: 36px; min-height: 36px; }
            .header-center .day-indicator { font-size: clamp(14px, 1.6vh, 19px); padding: 2px 12px; }
            .header-center .divider { font-size: clamp(14px, 1.6vh, 19px); }
            .header-right .time { font-size: clamp(15px, 1.7vh, 20px); }
            .header-right .period { font-size: clamp(9px, 1.0vh, 12px); }
            .header-right .version { font-size: clamp(8px, 0.8vh, 11px); }
            .header-right .date { font-size: clamp(12px, 1.3vh, 16px); }
            table { font-size: clamp(10px, 1.0vh, 14px); }
            thead th { font-size: clamp(8px, 0.8vh, 11px); padding: 0.25vh 4px; }
            tbody td { font-size: clamp(8px, 0.9vh, 12px) !important; padding: 0.25vh 4px; }
            .lesson-num { font-size: clamp(6px, 0.6vh, 8px) !important; }
            .subject { font-size: clamp(8px, 0.9vh, 12px) !important; }
            .cabinet { font-size: inherit !important; }
            .footer { font-size: clamp(7px, 0.7vh, 10px); }
        }

        @media (min-width: 1025px) and (max-width: 1600px) {
            .header-banner { height: 32px; max-height: 32px; min-height: 32px; }
            .header-center .day-indicator { font-size: clamp(13px, 1.4vh, 17px); padding: 1px 10px; }
            .header-center .divider { font-size: clamp(13px, 1.4vh, 17px); }
            .header-right .time { font-size: clamp(14px, 1.6vh, 19px); }
            .header-right .period { font-size: clamp(9px, 0.9vh, 12px); }
            .header-right .version { font-size: clamp(8px, 0.8vh, 10px); }
            .header-right .date { font-size: clamp(11px, 1.2vh, 15px); }
            table { font-size: clamp(10px, 1.0vh, 13px); }
            thead th { font-size: clamp(8px, 0.8vh, 11px); padding: 0.2vh 4px; }
            tbody td { font-size: clamp(8px, 0.9vh, 12px) !important; padding: 0.2vh 3px; }
            .lesson-num { font-size: clamp(6px, 0.6vh, 8px) !important; }
            .subject { font-size: clamp(8px, 0.9vh, 12px) !important; }
            .cabinet { font-size: inherit !important; }
            .footer { font-size: clamp(7px, 0.7vh, 10px); }
        }

        @media (min-width: 1601px) and (max-width: 1919px) {
            .container { padding: 10px 16px; }
            .header-banner { height: 44px; max-height: 44px; min-height: 44px; }
            .header-center .day-indicator { font-size: clamp(17px, 1.8vh, 24px); padding: 2px 16px; border-radius: 20px; }
            .header-center .divider { font-size: clamp(17px, 1.8vh, 24px); }
            .header-right .time { font-size: clamp(18px, 2.0vh, 26px); }
            .header-right .period { font-size: clamp(11px, 1.1vh, 15px); min-height: 2.0em; }
            .header-right .version { font-size: clamp(10px, 1.0vh, 13px); }
            .header-right .date { font-size: clamp(14px, 1.5vh, 19px); }
            table { font-size: clamp(12px, 1.2vh, 17px); }
            thead th { font-size: clamp(10px, 1.0vh, 14px); padding: 0.35vh 6px; border-bottom: 2.5px solid #2b6cb0; }
            thead th:first-child { width: 12px; min-width: 12px; max-width: 16px; }
            tbody td { font-size: clamp(10px, 1.1vh, 15px) !important; padding: 0.35vh 5px; border-bottom: 1.5px solid #e2e8f0; }
            .lesson-num { font-size: clamp(7px, 0.7vh, 9px) !important; }
            .subject { font-size: clamp(10px, 1.1vh, 15px) !important; }
            .cabinet { font-size: inherit !important; margin-top: 2px; }
            .footer { font-size: clamp(9px, 0.9vh, 13px); padding-top: 3px; margin-top: 3px; }
            .main-layout { gap: 10px; margin-top: 3px; }
        }

        /* ===== FULL HD (1920x1080) ===== */
        @media (min-width: 1920px) and (max-width: 2560px) {
            .container {
                padding: 17px 25px;
                border-radius: 25px;
            }

            .header {
                min-height: 64px;
                gap: 7px;
                padding-bottom: 7px;
                border-bottom-width: 2.8px;
            }

            .header-banner {
                height: 64px;
                max-height: 64px;
                min-height: 64px;
                max-width: 990px;
            }

            .header-center .day-indicator {
                font-size: clamp(23.5px, 2.55vh, 37.5px);
                padding: 4.5px 23px;
                border-radius: 27px;
            }
            .header-center .divider {
                font-size: clamp(23.5px, 2.55vh, 37.5px);
            }

            .header-right .time {
                font-size: clamp(23.5px, 2.75vh, 39.5px);
            }
            .header-right .period {
                font-size: clamp(13.5px, 1.45vh, 20.5px);
                min-height: 2.5em;
            }
            .header-right .period .line1 {
                font-size: 1em;
            }
            .header-right .period .line2 {
                font-size: 0.85em;
            }
            .header-right .version {
                font-size: clamp(11.5px, 1.15vh, 16.5px);
                padding: 0 15px;
                border-radius: 15px;
            }
            .header-right .date {
                font-size: clamp(17.5px, 1.85vh, 25.5px);
            }

            table {
                font-size: clamp(15.5px, 1.65vh, 24.5px);
            }

            thead th {
                font-size: clamp(12.5px, 1.35vh, 18.5px);
                padding: 0.55vh 9px;
                border-bottom: 2.8px solid #2b6cb0;
            }
            thead th:first-child {
                width: 15px;
                min-width: 15px;
                max-width: 19px;
            }

            tbody td {
                font-size: clamp(13.5px, 1.45vh, 21.5px) !important;
                padding: 0.55vh 9px;
                border-bottom: 1.8px solid #e2e8f0;
            }

            .lesson-num {
                font-size: clamp(8px, 0.8vh, 11px) !important;
            }

            .subject {
                font-size: clamp(13.5px, 1.45vh, 21.5px) !important;
            }

            .cabinet {
                font-size: inherit !important;
                margin-top: 2.8px;
            }

            .footer {
                font-size: clamp(11.5px, 1.15vh, 17.5px);
                padding-top: 5px;
                margin-top: 5px;
                border-top-width: 1.8px;
            }

            .main-layout {
                gap: 13px;
                margin-top: 5px;
            }
        }

        /* ===== SMART TV 4K (2561px+) ===== */
        @media (min-width: 2561px) {
            .container { padding: 20px 32px; border-radius: 32px; }
            .header { min-height: 72px; gap: 8px; padding-bottom: 8px; border-bottom-width: 3px; }
            .header-banner { height: 72px; max-height: 72px; min-height: 72px; max-width: 1200px; }
            .header-center .day-indicator { font-size: clamp(26px, 2.6vh, 40px); padding: 4px 28px; border-radius: 32px; }
            .header-center .divider { font-size: clamp(26px, 2.6vh, 40px); }
            .header-right .time { font-size: clamp(26px, 2.8vh, 42px); }
            .header-right .period { font-size: clamp(15px, 1.6vh, 24px); min-height: 2.8em; }
            .header-right .version { font-size: clamp(13px, 1.2vh, 18px); padding: 0 16px; border-radius: 18px; }
            .header-right .date { font-size: clamp(19px, 2.0vh, 28px); }
            table { font-size: clamp(16px, 1.6vh, 26px); }
            thead th { font-size: clamp(13px, 1.3vh, 20px); padding: 0.6vh 12px; border-bottom: 4px solid #2b6cb0; }
            thead th:first-child { width: 17px; min-width: 17px; max-width: 22px; }
            tbody td { font-size: clamp(14px, 1.5vh, 24px) !important; padding: 0.6vh 12px; border-bottom: 2px solid #e2e8f0; }
            .lesson-num { font-size: clamp(9px, 0.9vh, 13px) !important; }
            .subject { font-size: clamp(14px, 1.5vh, 24px) !important; }
            .cabinet { font-size: inherit !important; margin-top: 3px; }
            .footer { font-size: clamp(11px, 1.1vh, 18px); padding-top: 6px; margin-top: 6px; border-top-width: 2px; }
            .main-layout { gap: 16px; margin-top: 6px; }
        }

        /* ================================================================
           ===== МОБИЛЬНЫЕ УСТРОЙСТВА =====
           ================================================================ */

        @media (max-width: 768px) {
            .container { padding: 5.5px 7.5px; border-radius: 11.5px; height: 99vh; }
            .header { gap: 3.5px; padding-bottom: 3.5px; min-height: auto; flex-wrap: wrap; }
            .header-left { flex: 0 0 100%; justify-content: center; order: 1; }
            .header-banner { height: 31px; max-height: 31px; min-height: 31px; min-width: 39px; border: 1px solid #e2e8f0; flex: 0 0 100%; }
            .header-center { order: 2; flex: 1; justify-content: center; gap: 7.5px; }
            .header-center .day-indicator { font-size: 17.5px; padding: 4.5px 17px; border-radius: 21px; }
            .header-center .divider { display: none; }
            .header-right { order: 3; text-align: center; align-items: center; width: 100%; flex-direction: row; flex-wrap: wrap; justify-content: center; gap: 3.5px 9px; margin-top: 3.5px; }
            .header-right .time { font-size: 19.5px; order: 1; }
            .header-right .period { font-size: 13.5px; min-height: 1.5em; order: 2; flex-direction: column; align-items: center; text-align: center; }
            .header-right .period .line1 { font-size: 13.5px; }
            .header-right .period .line2 { font-size: 12.5px; }
            .header-right .version { font-size: 12.5px; padding: 2.5px 11px; order: 3; }
            .header-right .date { font-size: 15.5px; order: 4; margin-top: 0; }
            .desktop-table { display: none !important; }
            .mobile-view { display: flex !important; }
            .footer { font-size: 12.5px; padding-top: 3.5px; margin-top: 3.5px; }
            .main-layout { gap: 0; margin-top: 3.5px; }
            .mobile-class-header { padding: 9px 13px; font-size: 17.5px; }
            .mobile-class-header .class-name { font-size: 17.5px; }
            .mobile-lesson-card { padding: 9px 13px; gap: 11px; }
            .mobile-lesson-card .lesson-num-mobile { font-size: 16.5px; min-width: 31px; }
            .mobile-lesson-card .lesson-info { gap: 2.5px; }
            .mobile-lesson-card .lesson-info .subject-name { font-size: 16.5px; }
            .mobile-lesson-card .lesson-info .room-name { font-size: 16.5px; font-weight: 700; color: #e65100; }
            .mobile-lesson-card .lesson-time { font-size: 14.5px; }
        }

        @media (max-width: 400px) {
            .container { padding: 3.5px 3.5px; }
            .header-banner { height: 25px; max-height: 25px; min-height: 25px; min-width: 29px; }
            .header-center .day-indicator { font-size: 15.5px; padding: 3.5px 13px; }
            .header-right .time { font-size: 16.5px; }
            .header-right .period { font-size: 11.5px; min-height: 1.3em; }
            .header-right .period .line1 { font-size: 11.5px; }
            .header-right .period .line2 { font-size: 10.5px; }
            .header-right .version { font-size: 10.5px; padding: 1.5px 9px; }
            .header-right .date { font-size: 13.5px; }
            .mobile-class-header { padding: 7px 11px; font-size: 15.5px; }
            .mobile-class-header .class-name { font-size: 15.5px; }
            .mobile-lesson-card { padding: 7px 11px; gap: 9px; }
            .mobile-lesson-card .lesson-num-mobile { font-size: 14.5px; min-width: 25px; }
            .mobile-lesson-card .lesson-info .subject-name { font-size: 14.5px; }
            .mobile-lesson-card .lesson-info .room-name { font-size: 14.5px; font-weight: 700; color: #e65100; }
            .mobile-lesson-card .lesson-time { font-size: 12.5px; }
            .footer { font-size: 10.5px; }
        }

        @media print {
            .no-print { display: none !important; }
            .header-banner { border: none !important; background: none !important; max-width: 1200px !important; height: 40px !important; max-height: 40px !important; min-height: 40px !important; }
            body, html { background: white !important; overflow: visible !important; }
            .container { border: none !important; box-shadow: none !important; }
            .mobile-view { display: none !important; }
            .desktop-table { display: table !important; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <div class="header-left">
                <div class="header-banner" id="headerBanner">
                    <img id="bannerImage" src="banner.png" alt="Баннер">
                </div>
            </div>

            <div class="header-center">
                <span class="day-indicator" id="dayIndicator">ПН</span>
                <span class="divider">|</span>
                <span class="period" id="currentPeriod">Загрузка...</span>
            </div>

            <div class="header-right">
                <div class="time" id="currentTime">--:--:--</div>
                <div class="date" id="currentDate">--.--.----</div>
                <div class="version" id="versionBadge">🏷️ v3.9.6</div>
            </div>
        </div>

        <div class="main-layout">
            <div class="table-wrapper" id="tableWrapper">
                <table class="desktop-table" id="scheduleTable">
                    <thead id="tableHead">
                        <tr><th></th></tr>
                    </thead>
                    <tbody id="scheduleBody">
                        <tr>
                            <td colspan="20" class="loading-overlay">
                                ⏳ Загрузка...
                                <span class="sub" id="loadStatus"></span>
                            </td>
                        </tr>
                    </tbody>
                </table>

                <div class="mobile-view" id="mobileView">
                    <div class="loading-overlay" style="height: auto; padding: 20px 0;">
                        ⏳ Загрузка...
                        <span class="sub" id="loadStatusMobile"></span>
                    </div>
                </div>
            </div>
        </div>

        <div class="footer no-print">
            🔄 Обновляется каждую минуту · Текущий урок подсвечен
        </div>
    </div>

    <!-- ================================================================ -->
    <!-- ЯНДЕКС МЕТРИКА                                                    -->
    <!-- ================================================================ -->
    <!-- Yandex.Metrika counter -->

    <script>
        // ================================================================
        // КОНФИГУРАЦИЯ
        // ================================================================
        var LESSON_TIMES = [
            { num: 1, start: "08:30", end: "09:10", break: "10" },
            { num: 2, start: "09:20", end: "10:00", break: "10" },
            { num: 3, start: "10:10", end: "10:50", break: "15" },
            { num: 4, start: "11:05", end: "11:45", break: "15" },
            { num: 5, start: "12:00", end: "12:40", break: "15" },
            { num: 6, start: "12:55", end: "13:35", break: "10" },
            { num: 7, start: "13:45", end: "14:25", break: "10" },
            { num: 8, start: "14:35", end: "15:15", break: "10" },
            { num: 9, start: "15:25", end: "16:05", break: "10" }
        ];

        var MAX_LESSONS = 9;

        var PRIMARY_CLASSES = ['5А', '5Б', '6А', '6Б', '6В', '7А', '7Б', '7В', '8А', '8Б', '8В', '9А', '9Б', '9В', '10А', '10Б',
            '11А', '11Б'
        ];

        var DAYS_SHORT = { 1: "ПН", 2: "ВТ", 3: "СР", 4: "ЧТ", 5: "ПТ", 6: "СБ", 0: "ВС" };
        var DAYS_FULL = { 1: "Понедельник", 2: "Вторник", 3: "Среда", 4: "Четверг", 5: "Пятница", 6: "Суббота", 0: "Воскресенье" };
        var DAYS_LIST = ['ПН', 'ВТ', 'СР', 'ЧТ', 'ПТ', 'СБ'];

        var weekDays = {};
        var classNames = [];
        var dataLoaded = false;
        var APP_VERSION = 'v3.9.6';

        document.getElementById('versionBadge').textContent = '🏷️ ' + APP_VERSION;

        // ================================================================
        // УТИЛИТЫ
        // ================================================================
        function parseTime(timeStr) {
            var parts = timeStr.split(':');
            return parseInt(parts[0]) * 60 + parseInt(parts[1]);
        }

        function formatMinutes(minutes) {
            if (minutes === undefined || minutes === null) return '0 мин';
            var rounded = Math.ceil(minutes);
            if (rounded <= 0) return '0 мин';
            if (rounded >= 60) {
                var hours = Math.floor(rounded / 60);
                var mins = rounded % 60;
                if (mins === 0) return hours + ' ч';
                return hours + ' ч ' + mins + ' мин';
            }
            return rounded + ' мин';
        }

        function getCurrentPeriodInfo() {
            var now = new Date();
            var totalMinutes = now.getHours() * 60 + now.getMinutes();

            for (var i = 0; i < LESSON_TIMES.length; i++) {
                var lesson = LESSON_TIMES[i];
                var startMin = parseTime(lesson.start);
                var endMin = parseTime(lesson.end);

                if (totalMinutes >= startMin && totalMinutes < endMin) {
                    return {
                        type: 'lesson',
                        num: lesson.num,
                        start: lesson.start,
                        end: lesson.end
                    };
                }
            }

            for (var i = 0; i < LESSON_TIMES.length; i++) {
                var lesson = LESSON_TIMES[i];
                var startMin = parseTime(lesson.start);

                if (i > 0) {
                    var prevEndMin = parseTime(LESSON_TIMES[i - 1].end);
                    if (totalMinutes >= prevEndMin && totalMinutes < startMin) {
                        var diff = startMin - totalMinutes;
                        return {
                            type: 'break',
                            nextLesson: lesson.num,
                            nextStart: lesson.start,
                            remaining: diff
                        };
                    }
                }

                if (i === 0 && totalMinutes < startMin) {
                    var diff = startMin - totalMinutes;
                    return {
                        type: 'before',
                        nextLesson: lesson.num,
                        nextStart: lesson.start,
                        remaining: diff
                    };
                }
            }

            var lastEndMin = parseTime(LESSON_TIMES[LESSON_TIMES.length - 1].end);
            if (totalMinutes >= lastEndMin) {
                return { type: 'after' };
            }

            return { type: 'unknown' };
        }

        function getPeriodName() {
            var info = getCurrentPeriodInfo();

            if (info.type === 'lesson') {
                return '📖 ' + info.num + '-й урок (' + info.start + '–' + info.end + ')';
            }

            if (info.type === 'break') {
                if (info.remaining <= 0) {
                    return '⏰ ' + info.nextLesson + '-й урок начинается';
                }
                return '⏳ До ' + info.nextLesson + '-го урока ' + formatMinutes(info.remaining);
            }

            if (info.type === 'before') {
                if (info.remaining <= 0) {
                    return '⏰ ' + info.nextLesson + '-й урок начинается';
                }
                return '⏳ До начала занятий ' + formatMinutes(info.remaining);
            }

            if (info.type === 'after') {
                var today = new Date();
                var dayNum = today.getDay();
                var nextDayNum = dayNum + 1;
                if (nextDayNum === 7) nextDayNum = 1;
                if (nextDayNum === 0) nextDayNum = 1;
                var nextDayFull = DAYS_FULL[nextDayNum] || 'Понедельник';
                var dayGenitive = {
                    'Понедельник': 'понедельник',
                    'Вторник': 'вторник',
                    'Среда': 'среду',
                    'Четверг': 'четверг',
                    'Пятница': 'пятницу',
                    'Суббота': 'субботу',
                    'Воскресенье': 'воскресенье'
                };
                var nextDayGen = dayGenitive[nextDayFull] || nextDayFull.toLowerCase();
                return '<span class="line1">📌 Изменения</span><span class="line2">на ' + nextDayGen + '</span>';
            }

            return '⏰ Загрузка...';
        }

        function getDisplayDay() {
            var now = new Date();
            var dayNum = now.getDay();
            if (dayNum === 0) dayNum = 1;
            return {
                key: DAYS_SHORT[dayNum] || "ПН",
                full: DAYS_FULL[dayNum] || "Понедельник"
            };
        }

        function getTargetDay() {
            var now = new Date();
            var dayNum = now.getDay();
            var hours = now.getHours();
            var minutes = now.getMinutes();
            var totalMinutes = hours * 60 + minutes;

            var shift = (totalMinutes >= 17 * 60) ? 1 : 0;
            var targetDayNum = dayNum + shift;

            if (targetDayNum === 0) targetDayNum = 1;
            if (targetDayNum > 6) targetDayNum = 1;

            var dayKey = DAYS_SHORT[targetDayNum] || "ПН";
            var dayFull = DAYS_FULL[targetDayNum] || "Понедельник";

            if (weekDays[dayKey] && Object.keys(weekDays[dayKey]).length > 0) {
                return { key: dayKey, full: dayFull };
            }

            for (var i = 0; i < DAYS_LIST.length; i++) {
                var d = DAYS_LIST[i];
                if (weekDays[d] && Object.keys(weekDays[d]).length > 0) {
                    return { key: d, full: DAYS_FULL[DAYS_LIST.indexOf(d) + 1] || d };
                }
            }

            return { key: "ПН", full: "Понедельник" };
        }

        function loadData() {
            var statusEl = document.getElementById('loadStatus');
            var statusMobile = document.getElementById('loadStatusMobile');
            if (statusEl) statusEl.textContent = 'Загрузка data.json...';
            if (statusMobile) statusMobile.textContent = 'Загрузка data.json...';

            fetch('data.json?t=' + Date.now())
                .then(function(res) {
                    if (!res.ok) throw new Error('data.json не найден (код ' + res.status + ')');
                    return res.json();
                })
                .then(function(data) {
                    var scheduleData = null;

                    if (data.schedule) {
                        if (data.schedule.primary) {
                            scheduleData = data.schedule.primary;
                        } else {
                            scheduleData = data.schedule;
                        }
                    } else if (data.primary) {
                        scheduleData = data.primary;
                    } else {
                        scheduleData = data;
                    }

                    var hasDays = false;
                    DAYS_LIST.forEach(function(day) {
                        if (scheduleData && scheduleData[day]) {
                            hasDays = true;
                            var filtered = {};
                            Object.keys(scheduleData[day]).forEach(function(cls) {
                                if (PRIMARY_CLASSES.indexOf(cls) !== -1) {
                                    filtered[cls] = scheduleData[day][cls];
                                }
                            });
                            if (Object.keys(filtered).length > 0) {
                                weekDays[day] = filtered;
                            } else {
                                weekDays[day] = {};
                            }
                        }
                    });

                    if (!hasDays) {
                        Object.keys(scheduleData || {}).forEach(function(key) {
                            if (DAYS_LIST.indexOf(key) !== -1) {
                                var filtered = {};
                                Object.keys(scheduleData[key] || {}).forEach(function(cls) {
                                    if (PRIMARY_CLASSES.indexOf(cls) !== -1) {
                                        filtered[cls] = scheduleData[key][cls];
                                    }
                                });
                                if (Object.keys(filtered).length > 0) {
                                    weekDays[key] = filtered;
                                    hasDays = true;
                                } else {
                                    weekDays[key] = {};
                                }
                            }
                        });
                    }

                    if (!hasDays) {
                        DAYS_LIST.forEach(function(day) {
                            weekDays[day] = {};
                        });
                    }

                    DAYS_LIST.forEach(function(day) {
                        if (!weekDays[day]) {
                            weekDays[day] = {};
                        }
                    });

                    if (statusEl) statusEl.textContent = '✅ data.json загружен';
                    if (statusMobile) statusMobile.textContent = '✅ data.json загружен';
                    processLoadedData();
                })
                .catch(function(err) {
                    console.warn('Ошибка загрузки data.json:', err.message);
                    if (statusEl) statusEl.textContent = '❌ ' + err.message;
                    if (statusMobile) statusMobile.textContent = '❌ ' + err.message;
                    DAYS_LIST.forEach(function(day) {
                        weekDays[day] = {};
                    });
                    processLoadedData();
                });
        }

        function processLoadedData() {
            classNames = PRIMARY_CLASSES;

            DAYS_LIST.forEach(function(day) {
                var dayData = weekDays[day] || {};
                classNames.forEach(function(cls) {
                    if (!dayData[cls]) {
                        dayData[cls] = [];
                        for (var i = 0; i < MAX_LESSONS; i++) {
                            dayData[cls].push(['', '']);
                        }
                    } else {
                        var lessons = dayData[cls];
                        while (lessons.length < MAX_LESSONS) {
                            lessons.push(['', '']);
                        }
                    }
                });
                weekDays[day] = dayData;
            });

            dataLoaded = true;
            renderTable();
            renderMobile();
        }

        function sortClasses(classes) {
            var letters = "АБВГДЕЁЖЗИЙКЛМНОПРСТУФХЦЧШЩЪЫЬЭЮЯ";
            return classes.sort(function(a, b) {
                var numA = parseInt(a.match(/\d+/)?.[0] || 0);
                var numB = parseInt(b.match(/\d+/)?.[0] || 0);
                if (numA !== numB) return numA - numB;
                var lA = a.match(/[А-Я]/)?.[0] || '';
                var lB = b.match(/[А-Я]/)?.[0] || '';
                return letters.indexOf(lA) - letters.indexOf(lB);
            });
        }

        function renderTable() {
            if (!dataLoaded && Object.keys(weekDays).length === 0) return;

            var targetDay = getTargetDay();
            var dayKey = targetDay.key;

            var displayDay = getDisplayDay();
            var displayFull = displayDay.full;

            var currentLesson = 0;
            var info = getCurrentPeriodInfo();
            if (info.type === 'lesson') {
                currentLesson = info.num;
            } else if (info.type === 'break' || info.type === 'before') {
                currentLesson = info.nextLesson - 1;
                if (currentLesson < 0) currentLesson = 0;
            }

            var now = new Date();
            var dateStr = now.toLocaleDateString('ru-RU', {
                day: '2-digit',
                month: '2-digit',
                year: 'numeric'
            });

            document.getElementById('dayIndicator').textContent = displayFull;
            document.getElementById('currentDate').textContent = dateStr;
            document.getElementById('currentPeriod').innerHTML = getPeriodName();

            var dayData = weekDays[dayKey];
            if (!dayData || Object.keys(dayData).length === 0) {
                document.getElementById('scheduleBody').innerHTML =
                    '<tr><td colspan="20" class="loading-overlay">📌 Нет расписания</td></tr>';
                return;
            }

            var classes = Object.keys(dayData).filter(function(cls) {
                return PRIMARY_CLASSES.indexOf(cls) !== -1;
            });

            if (classes.length === 0) {
                classes = PRIMARY_CLASSES;
            }
            classes = sortClasses(classes);

            var headerHTML = '<tr><th></th>';
            classes.forEach(function(cls) { headerHTML += '<th>' + cls + '</th>'; });
            headerHTML += '</tr>';
            document.getElementById('tableHead').innerHTML = headerHTML;

            var bodyHTML = '';
            for (var lessonNum = 1; lessonNum <= MAX_LESSONS; lessonNum++) {
                var idx = lessonNum - 1;
                var isCurrent = (lessonNum === currentLesson && currentLesson >= 1 && currentLesson <= MAX_LESSONS);
                bodyHTML += '<tr class="' + (isCurrent ? 'current-lesson' : '') + '">';
                bodyHTML += '<td><span class="lesson-num">' + lessonNum + '</span></td>';

                classes.forEach(function(cls) {
                    var lessons = dayData[cls] || [];
                    var lesson = lessons[idx] || ['', ''];
                    var subject = '';
                    var cabinet = '';
                    if (Array.isArray(lesson)) {
                        subject = lesson[0] || '';
                        cabinet = lesson[1] || '';
                    } else if (typeof lesson === 'object' && lesson !== null) {
                        subject = lesson.subject || lesson[0] || '';
                        cabinet = lesson.room || lesson[1] || '';
                    }
                    if (subject && subject.trim() !== '') {
                        bodyHTML += '<td><span class="subject">' + subject + '</span><span class="cabinet">' +
                            cabinet + '</span></td>';
                    } else {
                        bodyHTML += '<td class="empty-cell">—</td>';
                    }
                });
                bodyHTML += '</tr>';
            }
            document.getElementById('scheduleBody').innerHTML = bodyHTML;
        }

        function renderMobile() {
            if (!dataLoaded && Object.keys(weekDays).length === 0) return;

            var targetDay = getTargetDay();
            var dayKey = targetDay.key;

            var currentLesson = 0;
            var info = getCurrentPeriodInfo();
            if (info.type === 'lesson') {
                currentLesson = info.num;
            } else if (info.type === 'break' || info.type === 'before') {
                currentLesson = info.nextLesson - 1;
                if (currentLesson < 0) currentLesson = 0;
            }

            var dayData = weekDays[dayKey];
            if (!dayData || Object.keys(dayData).length === 0) {
                document.getElementById('mobileView').innerHTML =
                    '<div style="text-align:center;padding:30px 0;color:#a0aec0;">📌 Нет расписания</div>';
                return;
            }

            var classes = Object.keys(dayData).filter(function(cls) {
                return PRIMARY_CLASSES.indexOf(cls) !== -1;
            });

            if (classes.length === 0) {
                classes = PRIMARY_CLASSES;
            }
            classes = sortClasses(classes);

            var html = '';
            classes.forEach(function(className) {
                var lessons = dayData[className] || [];

                html += '<div class="mobile-class-card">';
                html += '<div class="mobile-class-header">';
                html += '<span class="class-name">' + className + '</span>';
                html += '</div>';

                for (var i = 0; i < MAX_LESSONS; i++) {
                    var lesson = lessons[i] || ['', ''];
                    var subject = Array.isArray(lesson) ? lesson[0] : (lesson.subject || lesson[0] || '');
                    var cabinet = Array.isArray(lesson) ? lesson[1] : (lesson.room || lesson[1] || '');
                    var isCurrent = (i + 1 === currentLesson);

                    var hasContent = subject && subject.trim() !== '';

                    html += '<div class="mobile-lesson-card' + (isCurrent ? ' current' : '') + '">';
                    html += '<span class="lesson-num-mobile">' + (i + 1) + '</span>';

                    if (hasContent) {
                        html += '<div class="lesson-info">';
                        html += '<span class="subject-name">' + subject + '</span>';
                        if (cabinet && cabinet.trim() !== '') {
                            html += '<span class="room-name">' + cabinet + '</span>';
                        }
                        html += '</div>';
                        html += '<span class="lesson-time">' + LESSON_TIMES[i].start + '–' + LESSON_TIMES[i].end +
                        '</span>';
                    } else {
                        html += '<div class="lesson-info">';
                        html += '<span class="subject-name empty">— нет урока —</span>';
                        html += '</div>';
                        html += '<span class="lesson-time">' + LESSON_TIMES[i].start + '–' + LESSON_TIMES[i].end +
                        '</span>';
                    }

                    html += '</div>';
                }

                html += '</div>';
            });

            document.getElementById('mobileView').innerHTML = html;
        }

        function updateTime() {
            var now = new Date();
            document.getElementById('currentTime').textContent =
                now.toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
        }

        function refreshAll() {
            updateTime();
            document.getElementById('currentPeriod').innerHTML = getPeriodName();
            if (dataLoaded || Object.keys(weekDays).length > 0) {
                renderTable();
                renderMobile();
            }
        }

        loadData();
        setInterval(refreshAll, 1000);
        setInterval(function() {
            loadData();
        }, 60000);
    </script>
