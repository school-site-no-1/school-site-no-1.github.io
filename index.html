<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Расписание 5-11</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #f0f4f8;
            font-family: 'Segoe UI', Arial, sans-serif;
        }
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 6px;
        }

        .container {
            width: 100%;
            height: 99vh;
            max-width: 1700px;
            background: #ffffff;
            border-radius: 20px;
            padding: 12px 18px;
            border: 1px solid #d0d7e0;
            display: flex;
            flex-direction: column;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.08);
        }

        .header {
            flex-shrink: 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #e2e8f0;
            padding-bottom: 6px;
            flex-wrap: wrap;
            gap: 5px;
        }
        .header-left {
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }
        .header-left h1 {
            color: #1a365d;
            font-size: clamp(20px, 2.8vh, 36px);
            font-weight: 700;
        }
        .header-left .day-indicator {
            color: #fff;
            font-size: clamp(15px, 2vh, 26px);
            font-weight: 600;
            background: #2b6cb0;
            padding: 2px 16px;
            border-radius: 20px;
        }
        .header-left .subtitle {
            color: #4a5568;
            font-size: clamp(12px, 1.5vh, 18px);
        }
        .header-right {
            text-align: right;
        }
        .header-right .time {
            color: #2b6cb0;
            font-size: clamp(18px, 2.5vh, 32px);
            font-weight: 700;
        }
        .header-right .period {
            color: #e65100;
            font-size: clamp(13px, 1.7vh, 22px);
            font-weight: 600;
        }

        .table-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-height: 0;
            margin-top: 4px;
            overflow: hidden;
        }
        table {
            width: 100%;
            height: 100%;
            border-collapse: collapse;
            font-size: clamp(12px, 1.6vh, 22px);
            table-layout: fixed;
        }

        thead th,
        tbody td {
            border-right: 2px solid #d0d7e0;
        }
        thead th:last-child,
        tbody td:last-child {
            border-right: none;
        }

        thead th {
            background: #edf2f7;
            color: #1a365d;
            font-weight: 700;
            padding: 0.4vh 6px;
            text-align: center;
            border-bottom: 3px solid #2b6cb0;
            font-size: clamp(10px, 1.3vh, 17px);
            text-transform: uppercase;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        thead th:first-child {
            width: 4%;
            min-width: 28px;
        }
        thead th:not(:first-child) {
            width: 5.3%;
        }

        tbody td {
            padding: 0.3vh 6px;
            color: #2d3748;
            border-bottom: 1px solid #e2e8f0;
            vertical-align: middle;
            text-align: center;
            word-wrap: break-word !important;
            word-break: break-word !important;
            white-space: normal !important;
            overflow-wrap: break-word !important;
            hyphens: auto !important;
            -webkit-hyphens: auto !important;
            -moz-hyphens: auto !important;
            -ms-hyphens: auto !important;
            line-height: 1.3;
            font-size: clamp(10px, 1.5vh, 19px) !important;
        }
        tbody tr:nth-child(even) {
            background: #f7fafc;
        }
        tbody tr:nth-child(odd) {
            background: #ffffff;
        }

        tbody tr.current-lesson {
            background: #bee3f8 !important;
        }
        tbody tr.current-lesson td {
            color: #1a365d;
            font-weight: 600;
        }
        tbody tr.current-lesson .lesson-num {
            color: #2b6cb0;
        }

        .lesson-num {
            font-weight: 700;
            color: #4a5568;
            font-size: clamp(11px, 1.6vh, 20px) !important;
        }

        .subject {
            display: block;
            font-weight: 500;
            line-height: 1.3;
            color: #2d3748;
            font-size: clamp(10px, 1.5vh, 19px) !important;
            word-wrap: break-word !important;
            word-break: break-word !important;
            white-space: normal !important;
            overflow-wrap: break-word !important;
            hyphens: auto !important;
            -webkit-hyphens: auto !important;
            -moz-hyphens: auto !important;
            -ms-hyphens: auto !important;
        }

        .cabinet {
            color: #e65100;
            font-size: 18px !important;
            display: block;
            font-weight: 700;
            margin-top: 2px;
        }

        .empty-cell {
            color: #cbd5e0;
        }

        .footer {
            flex-shrink: 0;
            margin-top: 3px;
            color: #a0aec0;
            font-size: clamp(9px, 1.2vh, 14px);
            text-align: center;
            border-top: 1px solid #e2e8f0;
            padding-top: 3px;
        }

        .loading-overlay {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100%;
            color: #4a5568;
            font-size: clamp(14px, 2vh, 24px);
            font-weight: 300;
            flex-direction: column;
            gap: 10px;
        }
        .loading-overlay .sub {
            font-size: 0.6em;
            color: #a0aec0;
        }

        @media (max-width: 800px) {
            .container {
                padding: 6px 8px;
                border-radius: 12px;
                height: 99vh;
            }
            thead th,
            tbody td {
                padding: 0.2vh 3px;
            }
            tbody td {
                font-size: clamp(7px, 1.2vh, 13px) !important;
            }
            .subject {
                font-size: clamp(7px, 1.2vh, 13px) !important;
            }
            .cabinet {
                font-size: 13px !important;
            }
            .lesson-num {
                font-size: clamp(8px, 1.3vh, 14px) !important;
            }
            thead th:not(:first-child) {
                width: 5%;
            }
        }

        @media print {
            .no-print {
                display: none !important;
            }
            body,
            html {
                background: white !important;
                overflow: visible !important;
            }
            .container {
                border: none !important;
                box-shadow: none !important;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <div class="header-left">
                <h1>📚 Расписание</h1>
                <span class="day-indicator" id="dayIndicator">ПН</span>
                <span class="subtitle" id="dateSubtitle">5-11 классы</span>
            </div>
            <div class="header-right">
                <div class="time" id="currentTime">--:--:--</div>
                <div class="period" id="currentPeriod">Загрузка...</div>
            </div>
        </div>

        <div class="table-wrapper" id="tableWrapper">
            <table id="scheduleTable">
                <thead id="tableHead">
                    <tr><th>№</th></tr>
                </thead>
                <tbody id="scheduleBody">
                    <tr>
                        <td colspan="20" class="loading-overlay">
                            ⏳ Загрузка...
                            <span class="sub" id="loadStatus"></span>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div class="footer no-print">
            🔄 Обновляется каждую минуту · Текущий урок подсвечен
        </div>
    </div>

    <script>
        // ================================================================
        // РАСПИСАНИЕ (ПН, ВТ, СР, ЧТ, ПТ, СБ)
        // ================================================================

        var LESSON_TIMES = ["08:30", "09:20", "10:10", "11:00", "11:50", "12:40", "13:30"];

        var weekDays = {};
        var classNames = [];
        var dataLoaded = false;

        // ================================================================
        // ДНИ НЕДЕЛИ (С СУББОТОЙ)
        // ================================================================
        var DAYS_SHORT = { 1: "ПН", 2: "ВТ", 3: "СР", 4: "ЧТ", 5: "ПТ", 6: "СБ", 0: "ВС" };
        var DAYS_FULL = { 1: "Понедельник", 2: "Вторник", 3: "Среда", 4: "Четверг", 5: "Пятница", 6: "Суббота", 0: "Воскресенье" };
        var DAYS_LIST = ['ПН', 'ВТ', 'СР', 'ЧТ', 'ПТ', 'СБ'];

        // ================================================================
        // ЗАГРУЗКА (СНАЧАЛА data.json, ПОТОМ ОТДЕЛЬНЫЕ ФАЙЛЫ)
        // ================================================================
        function loadData() {
            var statusEl = document.getElementById('loadStatus');
            if (statusEl) statusEl.textContent = 'Загрузка...';

            // Пытаемся загрузить data.json
            fetch('data.json?t=' + Date.now())
                .then(function(res) {
                    if (!res.ok) throw new Error('data.json не найден');
                    return res.json();
                })
                .then(function(data) {
                    weekDays = data;
                    processLoadedData();
                    if (statusEl) statusEl.textContent = '✅ data.json загружен';
                })
                .catch(function(err) {
                    console.warn('data.json не загружен, пробуем отдельные файлы:', err.message);
                    if (statusEl) statusEl.textContent = 'Загрузка отдельных дней...';
                    loadSeparateDays();
                });
        }

        // ================================================================
        // ЗАГРУЗКА ОТДЕЛЬНЫХ ФАЙЛОВ ДНЕЙ
        // ================================================================
        function loadSeparateDays() {
            var loadedCount = 0;
            var totalDays = DAYS_LIST.length;

            DAYS_LIST.forEach(function(day) {
                var fileName = day + '.json';
                fetch(fileName + '?t=' + Date.now())
                    .then(function(res) {
                        if (!res.ok) throw new Error('Файл ' + fileName + ' не найден');
                        return res.json();
                    })
                    .then(function(data) {
                        // Проверяем структуру: если data = { "ПТ": { ... } } или просто { "5А": [...] }
                        if (data[day]) {
                            weekDays[day] = data[day];
                        } else if (data && typeof data === 'object' && !Array.isArray(data)) {
                            // Если данные без обёртки дня — пробуем использовать как есть
                            var firstKey = Object.keys(data)[0];
                            if (firstKey && CONFIG && CONFIG.CLASSES && CONFIG.CLASSES.indexOf(firstKey) !== -1) {
                                weekDays[day] = data;
                            } else {
                                weekDays[day] = data;
                            }
                        }
                        loadedCount++;
                        if (loadedCount === totalDays) {
                            processLoadedData();
                            var statusEl = document.getElementById('loadStatus');
                            if (statusEl) statusEl.textContent = '✅ Загружено ' + totalDays + ' дней';
                        }
                    })
                    .catch(function(err) {
                        console.warn('Не удалось загрузить ' + fileName, err.message);
                        loadedCount++;
                        if (loadedCount === totalDays) {
                            // Если ни один файл не загрузился — показываем ошибку
                            if (Object.keys(weekDays).length === 0) {
                                var statusEl = document.getElementById('loadStatus');
                                if (statusEl) statusEl.textContent = '❌ Нет данных';
                                document.getElementById('scheduleBody').innerHTML =
                                    '<tr><td colspan="20" class="loading-overlay">⚠️ Нет данных<span class="sub">Загрузите data.json или файлы дней</span></td></tr>';
                            } else {
                                processLoadedData();
                            }
                        }
                    });
            });
        }

        // ================================================================
        // ОБРАБОТКА ЗАГРУЖЕННЫХ ДАННЫХ
        // ================================================================
        function processLoadedData() {
            // Проверяем, есть ли суббота
            if (!weekDays['СБ']) {
                weekDays['СБ'] = {};
                // Создаём пустые уроки для субботы
                CONFIG.CLASSES.forEach(function(className) {
                    weekDays['СБ'][className] = [];
                    for (var i = 1; i <= 7; i++) {
                        weekDays['СБ'][className].push(['', '']);
                    }
                });
            }

            var allClasses = new Set();
            Object.keys(weekDays).forEach(function(day) {
                Object.keys(weekDays[day] || {}).forEach(function(cls) {
                    allClasses.add(cls);
                });
            });
            classNames = sortClasses(Array.from(allClasses));

            dataLoaded = true;
            renderTable();
        }

        // ================================================================
        // КОНФИГ (для создания пустых уроков)
        // ================================================================
        var CONFIG = {
            CLASSES: ['5А', '5Б', '5В', '6А', '6Б', '6В', '7А', '7Б', '7В', '8А', '8Б', '8В', '9А', '9Б', '9В', '10А', '10Б',
                '11А', '11Б'
            ]
        };

        // ================================================================
        // СОРТИРОВКА
        // ================================================================
        function sortClasses(classes) {
            var letters = "АБВГДЕЁЖЗИЙКЛМНОПРСТУФХЦЧШЩЪЫЬЭЮЯ";
            return classes.sort(function(a, b) {
                var numA = parseInt(a.match(/\d+/)?.[0] || 0);
                var numB = parseInt(b.match(/\d+/)?.[0] || 0);
                if (numA !== numB) return numA - numB;
                var lA = a.match(/[А-Я]/)?.[0] || '';
                var lB = b.match(/[А-Я]/)?.[0] || '';
                return letters.indexOf(lA) - letters.indexOf(lB);
            });
        }

        // ================================================================
        // ДЕНЬ НЕДЕЛИ
        // ================================================================
        function getCurrentDay() {
            var now = new Date();
            var dayNum = now.getDay();
            var dayKey = DAYS_SHORT[dayNum] || "ПН";
            var dayFull = DAYS_FULL[dayNum] || "Понедельник";
            if (!weekDays[dayKey]) {
                return { key: "ПН", full: DAYS_FULL[1] };
            }
            return { key: dayKey, full: dayFull };
        }

        function getCurrentLesson() {
            var now = new Date();
            var minutes = now.getHours() * 60 + now.getMinutes();
            for (var i = LESSON_TIMES.length - 1; i >= 0; i--) {
                var parts = LESSON_TIMES[i].split(':');
                var h = parseInt(parts[0]);
                var m = parseInt(parts[1]);
                if (minutes >= h * 60 + m) return i + 1;
            }
            return 0;
        }

        function getPeriodName(lessonNum) {
            if (lessonNum === 0) return "⏰ До начала занятий";
            if (lessonNum > 7) return "🎉 Занятия окончены";
            return '📖 ' + lessonNum + '-й урок (' + LESSON_TIMES[lessonNum - 1] + ')';
        }

        // ================================================================
        // ОТРИСОВКА
        // ================================================================
        function renderTable() {
            if (!dataLoaded && Object.keys(weekDays).length === 0) return;

            var dayInfo = getCurrentDay();
            var dayKey = dayInfo.key;
            var dayFull = dayInfo.full;
            var currentLesson = getCurrentLesson();

            var now = new Date();
            var dateStr = now.toLocaleDateString('ru-RU', { day: '2-digit', month: '2-digit', year: 'numeric' });

            document.getElementById('dayIndicator').textContent = dayFull;
            document.getElementById('dateSubtitle').textContent = '5-11 классы';
            document.getElementById('currentPeriod').textContent = getPeriodName(currentLesson);

            var dayData = weekDays[dayKey];
            if (!dayData) {
                document.getElementById('scheduleBody').innerHTML =
                    '<tr><td colspan="20" class="loading-overlay">📌 Нет расписания на ' + dayFull + '</td></tr>';
                return;
            }

            var classes = Object.keys(dayData);
            if (classes.length === 0) {
                document.getElementById('scheduleBody').innerHTML =
                    '<tr><td colspan="20" class="loading-overlay">📌 Нет классов</td></tr>';
                return;
            }
            classes = sortClasses(classes);

            var headerHTML = '<tr><th>№</th>';
            classes.forEach(function(cls) { headerHTML += '<th>' + cls + '</th>'; });
            headerHTML += '</tr>';
            document.getElementById('tableHead').innerHTML = headerHTML;

            var bodyHTML = '';
            for (var lessonNum = 1; lessonNum <= 7; lessonNum++) {
                var idx = lessonNum - 1;
                var isCurrent = (lessonNum === currentLesson && currentLesson >= 1 && currentLesson <= 7);
                bodyHTML += '<tr class="' + (isCurrent ? 'current-lesson' : '') + '">';
                bodyHTML += '<td><span class="lesson-num">' + lessonNum + '</span></td>';

                classes.forEach(function(cls) {
                    var lessons = dayData[cls] || [];
                    var lesson = lessons[idx] || ['', ''];
                    var subject = '';
                    var cabinet = '';
                    if (Array.isArray(lesson)) {
                        subject = lesson[0] || '';
                        cabinet = lesson[1] || '';
                    } else if (typeof lesson === 'object' && lesson !== null) {
                        subject = lesson.subject || lesson[0] || '';
                        cabinet = lesson.room || lesson[1] || '';
                    }
                    if (subject && subject.trim() !== '') {
                        bodyHTML += '<td><span class="subject">' + subject + '</span><span class="cabinet">' +
                            cabinet + '</span></td>';
                    } else {
                        bodyHTML += '<td class="empty-cell">—</td>';
                    }
                });
                bodyHTML += '</tr>';
            }
            document.getElementById('scheduleBody').innerHTML = bodyHTML;
        }

        // ================================================================
        // ЧАСЫ
        // ================================================================
        function updateTime() {
            var now = new Date();
            document.getElementById('currentTime').textContent =
                now.toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
        }

        function refreshAll() {
            updateTime();
            if (dataLoaded || Object.keys(weekDays).length > 0) renderTable();
        }

        // ================================================================
        // ЗАПУСК
        // ================================================================
        loadData();
        setInterval(refreshAll, 1000);
        setInterval(function() { loadData(); }, 60000);
    </script>

</body>
</html>
