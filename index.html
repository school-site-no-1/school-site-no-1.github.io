<html lang="ru" data-version="v3.10.0">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Расписание 5-11</title>

    <!-- PWA Мета-теги -->
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#2b6cb0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="/icon-512.png">

    <!-- ⭐ ВНЕШНИЙ CSS с версией -->
    <link rel="stylesheet" href="style.css?v=1.0.0">

    <style>
        /* Только критический CSS для быстрого старта (опционально) */
        /* Весь основной CSS вынесен в style.css */
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <div class="header-left">
                <div class="header-banner" id="headerBanner">
                    <img id="bannerImage" src="banner.png" alt="Баннер">
                </div>
            </div>

            <div class="header-center">
                <span class="day-indicator" id="dayIndicator">ПН</span>
                <span class="divider">|</span>
                <span class="period" id="currentPeriod">Загрузка...</span>
            </div>

            <div class="header-right">
                <div class="time" id="currentTime">--:--:--</div>
                <div class="date" id="currentDate">--.--.----</div>
                <div class="schedule-updated" id="scheduleUpdated">📅 загрузка...</div>
            </div>
        </div>

        <div id="pwaNotification">
            <p>📱 <strong>Установите приложение</strong><br>
            <span class="small">Нажмите "Добавить на главный экран" в браузере</span></p>
        </div>

        <div class="main-layout">
            <div class="table-wrapper" id="tableWrapper">
                <table class="desktop-table" id="scheduleTable">
                    <thead id="tableHead">
                        <tr><th></th></tr>
                    </thead>
                    <tbody id="scheduleBody">
                        <tr>
                            <td colspan="20" class="loading-overlay">
                                ⏳ Загрузка...
                                <span class="sub" id="loadStatus"></span>
                            </td>
                        </tr>
                    </tbody>
                </table>

                <div class="mobile-view" id="mobileView">
                    <div class="loading-overlay" style="height: auto; padding: 20px 0;">
                        ⏳ Загрузка...
                        <span class="sub" id="loadStatusMobile"></span>
                    </div>
                </div>
            </div>
        </div>

        <div class="footer no-print">
            <span class="version">🏷️ v<span id="appVersion">3.10.0</span></span>
        </div>
    </div>

    <div id="notification" class="notification">
        <span id="notificationMessage"></span>
    </div>
