<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Расписание 5-11</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #f0f4f8;
            font-family: 'Segoe UI', Arial, sans-serif;
        }
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 6px;
        }

        .container {
            width: 100%;
            height: 99vh;
            max-width: 1900px;
            background: #ffffff;
            border-radius: 20px;
            padding: 12px 18px;
            border: 1px solid #d0d7e0;
            display: flex;
            flex-direction: column;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.08);
        }

        .header {
            flex-shrink: 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #e2e8f0;
            padding-bottom: 6px;
            flex-wrap: wrap;
            gap: 8px;
        }
        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
            flex: 1;
            min-width: 0;
        }

        /* ===== БАННЕР В ШАПКЕ (БЕЗ СКРУГЛЕНИЙ) ===== */
        .header-banner {
            height: 45px;
            max-height: 155px;
            min-height: 30px;
            max-width: 1200px;
            min-width: 80px;
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f7fafc;
            overflow: hidden;
            flex-shrink: 1;
            padding: 0 10px;
            border: 1px solid #e2e8f0;
            border-radius: 0;
        }
        .header-banner img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* ===== ЦЕНТР: ДЕНЬ + ДАТА ===== */
        .header-center {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-shrink: 0;
            justify-content: center;
        }
        .header-center .day-indicator {
            color: #fff;
            font-size: clamp(16px, 2.2vh, 28px);
            font-weight: 600;
            background: #2b6cb0;
            padding: 2px 16px;
            border-radius: 20px;
            flex-shrink: 0;
        }
        .header-center .date {
            color: #4a5568;
            font-size: clamp(14px, 1.8vh, 24px);
            font-weight: 600;
        }
        .header-center .divider {
            color: #e2e8f0;
            font-size: clamp(18px, 2.5vh, 32px);
            font-weight: 300;
        }
        .header-right {
            text-align: right;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 2px;
            flex-shrink: 0;
        }
        .header-right .time {
            color: #2b6cb0;
            font-size: clamp(18px, 2.5vh, 32px);
            font-weight: 700;
        }
        .header-right .period {
            color: #e65100;
            font-size: clamp(13px, 1.7vh, 22px);
            font-weight: 600;
            min-height: 1.8em;
        }
        .header-right .version {
            color: #718096;
            font-size: clamp(10px, 1.2vh, 15px);
            font-weight: 500;
            background: #edf2f7;
            padding: 0 10px;
            border-radius: 12px;
        }

        /* ===== ОСНОВНОЙ МАКЕТ: ТОЛЬКО РАСПИСАНИЕ ===== */
        .main-layout {
            flex: 1;
            display: flex;
            gap: 12px;
            min-height: 0;
            margin-top: 4px;
        }

        /* ===== ТАБЛИЦА РАСПИСАНИЯ (ВО ВСЮ ШИРИНУ) ===== */
        .table-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-height: 0;
            overflow: hidden;
        }

        table {
            width: 100%;
            height: 100%;
            border-collapse: collapse;
            font-size: clamp(12px, 1.6vh, 22px);
            table-layout: fixed;
        }

        thead th,
        tbody td {
            border-right: 2px solid #d0d7e0;
        }
        thead th:last-child,
        tbody td:last-child {
            border-right: none;
        }

        thead th {
            background: #edf2f7;
            color: #1a365d;
            font-weight: 700;
            padding: 0.4vh 6px;
            text-align: center;
            border-bottom: 3px solid #2b6cb0;
            font-size: clamp(10px, 1.3vh, 17px);
            text-transform: uppercase;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        thead th:first-child {
            width: 4%;
            min-width: 28px;
        }
        thead th:not(:first-child) {
            width: 5.3%;
        }

        tbody td {
            padding: 0.3vh 6px;
            color: #2d3748;
            border-bottom: 1px solid #e2e8f0;
            vertical-align: middle;
            text-align: center;
            word-wrap: break-word !important;
            word-break: break-word !important;
            white-space: normal !important;
            overflow-wrap: break-word !important;
            hyphens: auto !important;
            -webkit-hyphens: auto !important;
            -moz-hyphens: auto !important;
            -ms-hyphens: auto !important;
            line-height: 1.3;
            font-size: clamp(10px, 1.5vh, 19px) !important;
        }
        tbody tr:nth-child(even) {
            background: #f7fafc;
        }
        tbody tr:nth-child(odd) {
            background: #ffffff;
        }

        tbody tr.current-lesson {
            background: #bee3f8 !important;
        }
        tbody tr.current-lesson td {
            color: #1a365d;
            font-weight: 600;
        }
        tbody tr.current-lesson .lesson-num {
            color: #2b6cb0;
        }

        .lesson-num {
            font-weight: 700;
            color: #4a5568;
            font-size: clamp(11px, 1.6vh, 20px) !important;
        }

        .subject {
            display: block;
            font-weight: 500;
            line-height: 1.3;
            color: #2d3748;
            font-size: clamp(10px, 1.5vh, 19px) !important;
            word-wrap: break-word !important;
            word-break: break-word !important;
            white-space: normal !important;
            overflow-wrap: break-word !important;
            hyphens: auto !important;
            -webkit-hyphens: auto !important;
            -moz-hyphens: auto !important;
            -ms-hyphens: auto !important;
        }

        .cabinet {
            color: #e65100;
            font-size: 18px !important;
            display: block;
            font-weight: 700;
            margin-top: 2px;
        }

        .empty-cell {
            color: #cbd5e0;
        }

        .footer {
            flex-shrink: 0;
            margin-top: 3px;
            color: #a0aec0;
            font-size: clamp(9px, 1.2vh, 14px);
            text-align: center;
            border-top: 1px solid #e2e8f0;
            padding-top: 3px;
        }

        .loading-overlay {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100%;
            color: #4a5568;
            font-size: clamp(14px, 2vh, 24px);
            font-weight: 300;
            flex-direction: column;
            gap: 10px;
        }
        .loading-overlay .sub {
            font-size: 0.6em;
            color: #a0aec0;
        }

        @media (max-width: 800px) {
            .container {
                padding: 6px 8px;
                border-radius: 12px;
                height: 99vh;
            }
            .header-banner {
                height: 30px;
                max-height: 35px;
                min-height: 20px;
                flex: 1;
                min-width: 60px;
                max-width: 100%;
            }
            .header-center {
                flex-direction: column;
                gap: 4px;
            }
            .header-center .divider {
                display: none;
            }
            thead th,
            tbody td {
                padding: 0.2vh 3px;
            }
            tbody td {
                font-size: clamp(7px, 1.2vh, 13px) !important;
            }
            .subject {
                font-size: clamp(7px, 1.2vh, 13px) !important;
            }
            .cabinet {
                font-size: 13px !important;
            }
            .lesson-num {
                font-size: clamp(8px, 1.3vh, 14px) !important;
            }
            thead th:not(:first-child) {
                width: 5%;
            }
        }

        @media print {
            .no-print {
                display: none !important;
            }
            .header-banner {
                border: none !important;
                background: none !important;
                max-width: 1200px !important;
            }
            body,
            html {
                background: white !important;
                overflow: visible !important;
            }
            .container {
                border: none !important;
                box-shadow: none !important;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <div class="header-left">

                <!-- ===== БАННЕР В ШАПКЕ (БЕЗ СКРУГЛЕНИЙ) ===== -->
                <div class="header-banner" id="headerBanner">
                    <img id="bannerImage" src="banner.png" alt="Баннер">
                </div>

            </div>

            <!-- ===== ЦЕНТР: ДЕНЬ НЕДЕЛИ + ДАТА ===== -->
            <div class="header-center">
                <span class="day-indicator" id="dayIndicator">ПН</span>
                <span class="date" id="currentDate">--.--.----</span>
                <span class="divider">|</span>
                <span class="period" id="currentPeriod">Загрузка...</span>
            </div>

            <div class="header-right">
                <div class="time" id="currentTime">--:--:--</div>
                <div class="version" id="versionBadge">🏷️ v2.9.5</div>
            </div>
        </div>

        <!-- ===== ОСНОВНОЙ МАКЕТ: ТОЛЬКО РАСПИСАНИЕ ===== -->
        <div class="main-layout">

            <!-- ===== ТАБЛИЦА РАСПИСАНИЯ (ВО ВСЮ ШИРИНУ) ===== -->
            <div class="table-wrapper" id="tableWrapper">
                <table id="scheduleTable">
                    <thead id="tableHead">
                        <tr><th>№</th></tr>
                    </thead>
                    <tbody id="scheduleBody">
                        <tr>
                            <td colspan="20" class="loading-overlay">
                                ⏳ Загрузка...
                                <span class="sub" id="loadStatus"></span>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>

        </div>

        <div class="footer no-print">
            🔄 Обновляется каждую минуту · Текущий урок подсвечен
        </div>
    </div>

    <script>
        // ================================================================
        // КОНФИГУРАЦИЯ
        // ================================================================
        // ===== РАСПИСАНИЕ ЗВОНКОВ (С ПЕРЕМЕНАМИ) =====
        var LESSON_TIMES = [
            { num: 1, start: "08:30", end: "09:10", break: "10" },
            { num: 2, start: "09:20", end: "10:00", break: "10" },
            { num: 3, start: "10:10", end: "10:50", break: "15" },
            { num: 4, start: "11:05", end: "11:45", break: "15" },
            { num: 5, start: "12:00", end: "12:40", break: "15" },
            { num: 6, start: "12:55", end: "13:35", break: "10" },
            { num: 7, start: "13:45", end: "14:25", break: "10" },
            { num: 8, start: "14:35", end: "15:15", break: "10" },
            { num: 9, start: "15:25", end: "16:05", break: "10" }
        ];

        var MAX_LESSONS = 9;

        // ================================================================
        // КЛАССЫ ОСНОВНОЙ ШКОЛЫ (5-11)
        // ================================================================
        var PRIMARY_CLASSES = ['5А', '5Б', '5В', '6А', '6Б', '6В', '7А', '7Б', '7В', '8А', '8Б', '8В', '9А', '9Б', '9В', '10А', '10Б',
            '11А', '11Б'
        ];

        // ================================================================
        // ДНИ НЕДЕЛИ (С СУББОТОЙ)
        // ================================================================
        var DAYS_SHORT = { 1: "ПН", 2: "ВТ", 3: "СР", 4: "ЧТ", 5: "ПТ", 6: "СБ", 0: "ВС" };
        var DAYS_FULL = { 1: "Понедельник", 2: "Вторник", 3: "Среда", 4: "Четверг", 5: "Пятница", 6: "Суббота", 0: "Воскресенье" };
        var DAYS_LIST = ['ПН', 'ВТ', 'СР', 'ЧТ', 'ПТ', 'СБ'];

        var weekDays = {};
        var classNames = [];
        var dataLoaded = false;
        var APP_VERSION = 'v2.9.5';

        // ================================================================
        // ВЕРСИЯ
        // ================================================================
        document.getElementById('versionBadge').textContent = '🏷️ ' + APP_VERSION;

        // ================================================================
        // РАСЧЁТ ТЕКУЩЕГО ПЕРИОДА (УРОК/ПЕРЕМЕНА)
        // ================================================================
        function parseTime(timeStr) {
            var parts = timeStr.split(':');
            return parseInt(parts[0]) * 60 + parseInt(parts[1]);
        }

        function formatMinutes(minutes) {
            if (minutes === undefined || minutes === null) return '0 мин';
            var rounded = Math.ceil(minutes);
            if (rounded <= 0) return '0 мин';
            if (rounded >= 60) {
                var hours = Math.floor(rounded / 60);
                var mins = rounded % 60;
                if (mins === 0) return hours + ' ч';
                return hours + ' ч ' + mins + ' мин';
            }
            return rounded + ' мин';
        }

        function getCurrentPeriodInfo() {
            var now = new Date();
            var totalMinutes = now.getHours() * 60 + now.getMinutes();

            // Проверяем, идёт ли сейчас какой-то урок
            for (var i = 0; i < LESSON_TIMES.length; i++) {
                var lesson = LESSON_TIMES[i];
                var startMin = parseTime(lesson.start);
                var endMin = parseTime(lesson.end);

                if (totalMinutes >= startMin && totalMinutes < endMin) {
                    return {
                        type: 'lesson',
                        num: lesson.num,
                        start: lesson.start,
                        end: lesson.end
                    };
                }
            }

            // Проверяем, идёт ли перемена перед следующим уроком
            for (var i = 0; i < LESSON_TIMES.length; i++) {
                var lesson = LESSON_TIMES[i];
                var startMin = parseTime(lesson.start);

                if (i > 0) {
                    var prevEndMin = parseTime(LESSON_TIMES[i - 1].end);
                    if (totalMinutes >= prevEndMin && totalMinutes < startMin) {
                        var diff = startMin - totalMinutes;
                        return {
                            type: 'break',
                            nextLesson: lesson.num,
                            nextStart: lesson.start,
                            remaining: diff
                        };
                    }
                }

                if (i === 0 && totalMinutes < startMin) {
                    var diff = startMin - totalMinutes;
                    return {
                        type: 'before',
                        nextLesson: lesson.num,
                        nextStart: lesson.start,
                        remaining: diff
                    };
                }
            }

            var lastEndMin = parseTime(LESSON_TIMES[LESSON_TIMES.length - 1].end);
            if (totalMinutes >= lastEndMin) {
                return { type: 'after' };
            }

            return { type: 'unknown' };
        }

        function getPeriodName() {
            var info = getCurrentPeriodInfo();

            if (info.type === 'lesson') {
                return '📖 ' + info.num + '-й урок (' + info.start + '–' + info.end + ')';
            }

            if (info.type === 'break') {
                if (info.remaining <= 0) {
                    return '⏰ ' + info.nextLesson + '-й урок начинается';
                }
                return '⏳ До ' + info.nextLesson + '-го урока ' + formatMinutes(info.remaining);
            }

            if (info.type === 'before') {
                if (info.remaining <= 0) {
                    return '⏰ ' + info.nextLesson + '-й урок начинается';
                }
                return '⏳ До начала занятий ' + formatMinutes(info.remaining);
            }

            if (info.type === 'after') {
                return '🎉 Занятия окончены';
            }

            return '⏰ Загрузка...';
        }

        // ================================================================
        // ЗАГРУЗКА DATA.JSON
        // ================================================================
        function loadData() {
            var statusEl = document.getElementById('loadStatus');
            if (statusEl) statusEl.textContent = 'Загрузка data.json...';

            fetch('data.json?t=' + Date.now())
                .then(function(res) {
                    if (!res.ok) throw new Error('data.json не найден (код ' + res.status + ')');
                    return res.json();
                })
                .then(function(data) {
                    var scheduleData = null;

                    if (data.schedule) {
                        if (data.schedule.primary) {
                            scheduleData = data.schedule.primary;
                        } else {
                            scheduleData = data.schedule;
                        }
                    } else if (data.primary) {
                        scheduleData = data.primary;
                    } else {
                        scheduleData = data;
                    }

                    var hasDays = false;
                    DAYS_LIST.forEach(function(day) {
                        if (scheduleData && scheduleData[day]) {
                            hasDays = true;
                            var filtered = {};
                            Object.keys(scheduleData[day]).forEach(function(cls) {
                                if (PRIMARY_CLASSES.indexOf(cls) !== -1) {
                                    filtered[cls] = scheduleData[day][cls];
                                }
                            });
                            if (Object.keys(filtered).length > 0) {
                                weekDays[day] = filtered;
                            } else {
                                weekDays[day] = {};
                            }
                        }
                    });

                    if (!hasDays) {
                        Object.keys(scheduleData || {}).forEach(function(key) {
                            if (DAYS_LIST.indexOf(key) !== -1) {
                                var filtered = {};
                                Object.keys(scheduleData[key] || {}).forEach(function(cls) {
                                    if (PRIMARY_CLASSES.indexOf(cls) !== -1) {
                                        filtered[cls] = scheduleData[key][cls];
                                    }
                                });
                                if (Object.keys(filtered).length > 0) {
                                    weekDays[key] = filtered;
                                    hasDays = true;
                                } else {
                                    weekDays[key] = {};
                                }
                            }
                        });
                    }

                    if (!hasDays) {
                        DAYS_LIST.forEach(function(day) {
                            weekDays[day] = {};
                        });
                    }

                    DAYS_LIST.forEach(function(day) {
                        if (!weekDays[day]) {
                            weekDays[day] = {};
                        }
                    });

                    if (statusEl) statusEl.textContent = '✅ data.json загружен';
                    processLoadedData();
                })
                .catch(function(err) {
                    console.warn('Ошибка загрузки data.json:', err.message);
                    if (statusEl) statusEl.textContent = '❌ ' + err.message;
                    DAYS_LIST.forEach(function(day) {
                        weekDays[day] = {};
                    });
                    processLoadedData();
                });
        }

        // ================================================================
        // ОБРАБОТКА ЗАГРУЖЕННЫХ ДАННЫХ
        // ================================================================
        function processLoadedData() {
            classNames = PRIMARY_CLASSES;

            DAYS_LIST.forEach(function(day) {
                var dayData = weekDays[day] || {};
                classNames.forEach(function(cls) {
                    if (!dayData[cls]) {
                        dayData[cls] = [];
                        for (var i = 0; i < MAX_LESSONS; i++) {
                            dayData[cls].push(['', '']);
                        }
                    } else {
                        var lessons = dayData[cls];
                        while (lessons.length < MAX_LESSONS) {
                            lessons.push(['', '']);
                        }
                    }
                });
                weekDays[day] = dayData;
            });

            dataLoaded = true;
            renderTable();
        }

        // ================================================================
        // СОРТИРОВКА КЛАССОВ
        // ================================================================
        function sortClasses(classes) {
            var letters = "АБВГДЕЁЖЗИЙКЛМНОПРСТУФХЦЧШЩЪЫЬЭЮЯ";
            return classes.sort(function(a, b) {
                var numA = parseInt(a.match(/\d+/)?.[0] || 0);
                var numB = parseInt(b.match(/\d+/)?.[0] || 0);
                if (numA !== numB) return numA - numB;
                var lA = a.match(/[А-Я]/)?.[0] || '';
                var lB = b.match(/[А-Я]/)?.[0] || '';
                return letters.indexOf(lA) - letters.indexOf(lB);
            });
        }

        // ================================================================
        // ДЕНЬ НЕДЕЛИ
        // ================================================================
        function getCurrentDay() {
            var now = new Date();
            var dayNum = now.getDay();

            var dayKey = DAYS_SHORT[dayNum] || "ПН";
            var dayFull = DAYS_FULL[dayNum] || "Понедельник";

            if (dayNum === 0) {
                for (var i = 0; i < DAYS_LIST.length; i++) {
                    var d = DAYS_LIST[i];
                    if (weekDays[d] && Object.keys(weekDays[d]).length > 0) {
                        return { key: d, full: DAYS_FULL[DAYS_LIST.indexOf(d) + 1] || d };
                    }
                }
                return { key: "ПН", full: "Понедельник" };
            }

            if (weekDays[dayKey] && Object.keys(weekDays[dayKey]).length > 0) {
                return { key: dayKey, full: dayFull };
            }

            for (var i = 0; i < DAYS_LIST.length; i++) {
                var d = DAYS_LIST[i];
                if (weekDays[d] && Object.keys(weekDays[d]).length > 0) {
                    return { key: d, full: DAYS_FULL[DAYS_LIST.indexOf(d) + 1] || d };
                }
            }

            return { key: "ПН", full: "Понедельник" };
        }

        // ================================================================
        // ОТРИСОВКА
        // ================================================================
        function renderTable() {
            if (!dataLoaded && Object.keys(weekDays).length === 0) return;

            var dayInfo = getCurrentDay();
            var dayKey = dayInfo.key;
            var dayFull = dayInfo.full;

            var currentLesson = 0;
            var info = getCurrentPeriodInfo();
            if (info.type === 'lesson') {
                currentLesson = info.num;
            } else if (info.type === 'break' || info.type === 'before') {
                currentLesson = info.nextLesson - 1;
                if (currentLesson < 0) currentLesson = 0;
            }

            var now = new Date();
            var dateStr = now.toLocaleDateString('ru-RU', {
                day: '2-digit',
                month: '2-digit',
                year: 'numeric'
            });

            document.getElementById('dayIndicator').textContent = dayFull;
            document.getElementById('currentDate').textContent = dateStr;
            document.getElementById('currentPeriod').textContent = getPeriodName();

            var dayData = weekDays[dayKey];
            if (!dayData || Object.keys(dayData).length === 0) {
                document.getElementById('scheduleBody').innerHTML =
                    '<tr><td colspan="20" class="loading-overlay">📌 Нет расписания на ' + dayFull +
                    '<span class="sub">Загрузите данные для этого дня</span></td></tr>';
                return;
            }

            var classes = Object.keys(dayData).filter(function(cls) {
                return PRIMARY_CLASSES.indexOf(cls) !== -1;
            });

            if (classes.length === 0) {
                classes = PRIMARY_CLASSES;
            }
            classes = sortClasses(classes);

            var headerHTML = '<tr><th>№</th>';
            classes.forEach(function(cls) { headerHTML += '<th>' + cls + '</th>'; });
            headerHTML += '</tr>';
            document.getElementById('tableHead').innerHTML = headerHTML;

            var bodyHTML = '';
            for (var lessonNum = 1; lessonNum <= MAX_LESSONS; lessonNum++) {
                var idx = lessonNum - 1;
                var isCurrent = (lessonNum === currentLesson && currentLesson >= 1 && currentLesson <= MAX_LESSONS);
                bodyHTML += '<tr class="' + (isCurrent ? 'current-lesson' : '') + '">';
                bodyHTML += '<td><span class="lesson-num">' + lessonNum + '</span></td>';

                classes.forEach(function(cls) {
                    var lessons = dayData[cls] || [];
                    var lesson = lessons[idx] || ['', ''];
                    var subject = '';
                    var cabinet = '';
                    if (Array.isArray(lesson)) {
                        subject = lesson[0] || '';
                        cabinet = lesson[1] || '';
                    } else if (typeof lesson === 'object' && lesson !== null) {
                        subject = lesson.subject || lesson[0] || '';
                        cabinet = lesson.room || lesson[1] || '';
                    }
                    if (subject && subject.trim() !== '') {
                        bodyHTML += '<td><span class="subject">' + subject + '</span><span class="cabinet">' +
                            cabinet + '</span></td>';
                    } else {
                        bodyHTML += '<td class="empty-cell">—</td>';
                    }
                });
                bodyHTML += '</tr>';
            }
            document.getElementById('scheduleBody').innerHTML = bodyHTML;
        }

        // ================================================================
        // ЧАСЫ
        // ================================================================
        function updateTime() {
            var now = new Date();
            document.getElementById('currentTime').textContent =
                now.toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
        }

        function refreshAll() {
            updateTime();
            document.getElementById('currentPeriod').textContent = getPeriodName();
            if (dataLoaded || Object.keys(weekDays).length > 0) renderTable();
        }

        // ================================================================
        // ЗАПУСК
        // ================================================================
        loadData();
        setInterval(refreshAll, 1000);
        setInterval(function() {
            loadData();
        }, 60000);
    </script>

</body>
</html>
