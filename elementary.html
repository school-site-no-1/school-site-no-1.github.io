<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>📋 Расписание начальной школы</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', 'Roboto', Arial, sans-serif;
            background: #e8f5e9;
            padding: 20px;
            color: #1b3a1b;
            min-height: 100vh;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: #ffffff;
            border-radius: 20px;
            border: 1px solid #a5d6a7;
            padding: 24px;
            box-shadow: 0 8px 32px rgba(46, 125, 50, 0.12);
        }

        /* ===== ШАПКА ===== */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            padding-bottom: 16px;
            border-bottom: 3px solid #66bb6a;
            margin-bottom: 20px;
        }
        .header-left {
            display: flex;
            align-items: center;
            gap: 14px;
            flex-wrap: wrap;
        }
        .header-left h1 {
            font-size: 1.9em;
            color: #1b5e20;
            font-weight: 700;
            letter-spacing: -0.5px;
        }
        .header-left .badge {
            background: #e8f5e9;
            color: #2e7d32;
            padding: 4px 16px;
            border-radius: 20px;
            font-size: 0.8em;
            font-weight: 600;
            border: 1px solid #81c784;
        }
        .header-right {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }
        .header-right .version {
            color: #66bb6a;
            font-size: 0.8em;
            font-weight: 500;
            background: #e8f5e9;
            padding: 4px 12px;
            border-radius: 12px;
        }
        .header-right .current-date {
            color: #2e7d32;
            font-size: 0.9em;
            font-weight: 500;
        }
        .header-right .day-label {
            background: #2e7d32;
            color: #ffffff;
            padding: 6px 20px;
            border-radius: 24px;
            font-size: 0.95em;
            font-weight: 600;
            box-shadow: 0 2px 8px rgba(46, 125, 50, 0.25);
        }

        /* ===== СЕТКА РАСПИСАНИЯ ===== */
        .schedule-grid {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .schedule-row {
            display: flex;
            gap: 16px;
        }
        .schedule-block {
            flex: 1;
            border: 1px solid #c8e6c9;
            border-radius: 14px;
            overflow: hidden;
            min-width: 0;
            background: #ffffff;
            transition: box-shadow 0.2s ease;
        }
        .schedule-block:hover {
            box-shadow: 0 4px 16px rgba(46, 125, 50, 0.10);
        }
        .class-header {
            background: linear-gradient(135deg, #e8f5e9, #c8e6c9);
            padding: 8px 12px;
            font-weight: 700;
            font-size: 1em;
            border-bottom: 2px solid #66bb6a;
            text-align: center;
            color: #1b5e20;
            letter-spacing: 0.3px;
        }
        .lessons-table {
            width: 100%;
            border-collapse: collapse;
        }
        .lessons-table td {
            padding: 5px 8px;
            border: 1px solid #e8f5e9;
            vertical-align: middle;
        }
        .lesson-number {
            width: 30px;
            text-align: center;
            font-weight: 700;
            color: #388e3c;
            font-size: 0.85em;
            background: #f1f8e9;
        }
        .lesson-subject {
            padding-left: 10px;
            font-weight: 500;
            font-size: 0.9em;
            color: #1b3a1b;
        }
        .lesson-room {
            text-align: center;
            font-weight: 600;
            color: #e65100;
            font-size: 0.85em;
            width: 60px;
            background: #fff3e0;
        }
        .lesson-empty {
            color: #a5d6a7;
            font-style: italic;
            font-weight: 400;
        }

        /* ===== СОСТОЯНИЯ ===== */
        .loading {
            text-align: center;
            padding: 60px 20px;
            color: #81c784;
        }
        .loading .spinner {
            font-size: 2.8em;
            display: block;
            margin-bottom: 12px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .loading .title {
            font-size: 1.1em;
            color: #388e3c;
        }
        .error {
            text-align: center;
            padding: 60px 20px;
            color: #c62828;
        }
        .error .icon {
            font-size: 2.8em;
            display: block;
            margin-bottom: 12px;
        }
        .error .title {
            font-size: 1.1em;
            font-weight: 600;
        }
        .error .sub {
            color: #66bb6a;
            font-size: 0.9em;
            margin-top: 4px;
        }

        /* ===== АДАПТИВНОСТЬ ===== */
        @media print {
            body {
                padding: 8px;
                background: #fff;
            }
            .container {
                box-shadow: none;
                border: 1px solid #c8e6c9;
            }
            .schedule-block {
                break-inside: avoid;
            }
            .header-right .day-label {
                background: #2e7d32;
                color: #fff;
            }
        }

        @media (max-width: 1200px) {
            .schedule-row {
                flex-wrap: wrap;
            }
            .schedule-block {
                flex: 0 0 calc(50% - 8px);
            }
        }
        @media (max-width: 768px) {
            .schedule-block {
                flex: 0 0 100%;
            }
            .header {
                flex-direction: column;
                align-items: stretch;
                text-align: center;
            }
            .header-left {
                justify-content: center;
            }
            .header-right {
                justify-content: center;
                flex-wrap: wrap;
            }
            .container {
                padding: 16px;
                border-radius: 14px;
            }
            .header-left h1 {
                font-size: 1.4em;
            }
            .header-right .day-label {
                font-size: 0.85em;
                padding: 4px 14px;
            }
        }
        @media (max-width: 480px) {
            body {
                padding: 10px;
            }
            .container {
                padding: 12px;
            }
            .schedule-block {
                border-radius: 10px;
            }
            .class-header {
                font-size: 0.85em;
                padding: 5px 8px;
            }
            .lessons-table td {
                padding: 3px 4px;
            }
            .lesson-number {
                width: 24px;
                font-size: 0.75em;
            }
            .lesson-subject {
                font-size: 0.75em;
                padding-left: 6px;
            }
            .lesson-room {
                font-size: 0.7em;
                width: 40px;
            }
        }
    </style>
</head>
<body>
    <div class="container" id="app">
        <div class="header">
            <div class="header-left">
                <h1>🌱 Расписание начальной школы</h1>
                <span class="badge">1-4 классы</span>
            </div>
            <div class="header-right">
                <span class="day-label" id="dayLabel">Загрузка...</span>
                <span class="current-date" id="currentDate"></span>
                <span class="version" id="versionBadge">v1.2.5</span>
            </div>
        </div>

        <div id="scheduleContainer">
            <div class="loading" id="loadingState">
                <span class="spinner">🌿</span>
                <div class="title">Загрузка расписания...</div>
            </div>
            <div class="schedule-grid" id="scheduleGrid" style="display:none;"></div>
            <div class="error" id="errorState" style="display:none;">
                <span class="icon">🍃</span>
                <div class="title">Ошибка загрузки данных</div>
                <div class="sub" id="errorMessage">Не удалось загрузить расписание</div>
            </div>
        </div>
    </div>

    <script>
        // ================================================================
        // ВЕРСИЯ
        // ================================================================
        var APP_VERSION = '1.2.5';

        // ================================================================
        // КОНФИГУРАЦИЯ
        // ================================================================
        var CONFIG = {
            DAYS: ['ПН', 'ВТ', 'СР', 'ЧТ', 'ПТ', 'СБ'],
            DAYS_RU: ['Понедельник', 'Вторник', 'Среда', 'Четверг', 'Пятница', 'Суббота'],
            CLASSES: ['1А', '1Б', '1В', '2А', '2Б', '2В', '3А', '3Б', '3В', '4А', '4Б', '4В'],
            MAX_LESSONS: 6,
            SHARED_ROOMS: ['Док', 'с/з']
        };

        // ================================================================
        // СОСТОЯНИЕ
        // ================================================================
        var state = {
            data: null,
            currentDay: null,
            loaded: false
        };

        // ================================================================
        // ПРЕОБРАЗОВАНИЕ ДАННЫХ (массив [предмет, кабинет] -> объект)
        // ================================================================
        function convertLessons(lessonsArray) {
            if (!lessonsArray || !Array.isArray(lessonsArray)) {
                return [];
            }
            return lessonsArray.map(function(item, index) {
                if (Array.isArray(item)) {
                    return {
                        lesson: index + 1,
                        subject: item[0] || '',
                        room: item[1] || ''
                    };
                } else if (item && typeof item === 'object' && item.subject !== undefined) {
                    return item;
                }
                return {
                    lesson: index + 1,
                    subject: '',
                    room: ''
                };
            });
        }

        function convertDayData(dayData) {
            if (!dayData || typeof dayData !== 'object') {
                return {};
            }
            var result = {};
            for (var className in dayData) {
                if (dayData.hasOwnProperty(className)) {
                    result[className] = convertLessons(dayData[className]);
                }
            }
            return result;
        }

        function convertFullData(data) {
            if (!data || typeof data !== 'object') {
                return {};
            }
            var result = {};
            for (var day in data) {
                if (data.hasOwnProperty(day)) {
                    result[day] = convertDayData(data[day]);
                }
            }
            return result;
        }

        // ================================================================
        // ОПРЕДЕЛЕНИЕ ТЕКУЩЕГО ДНЯ
        // ================================================================
        function getCurrentDay() {
            var now = new Date();
            var dayNum = now.getDay();
            if (dayNum === 0) dayNum = 7;
            var dayKey = CONFIG.DAYS[dayNum - 1] || 'ПН';

            if (state.data && state.data[dayKey]) {
                return dayKey;
            }

            for (var i = 0; i < CONFIG.DAYS.length; i++) {
                if (state.data && state.data[CONFIG.DAYS[i]]) {
                    return CONFIG.DAYS[i];
                }
            }
            return 'ПН';
        }

        // ================================================================
        // ИЗВЛЕЧЕНИЕ ДАННЫХ НАЧАЛЬНОЙ ШКОЛЫ ИЗ JSON
        // ================================================================
        function extractElementaryData(data) {
            if (data.schedule && data.schedule.elementary) {
                return data.schedule.elementary;
            }
            if (data.elementary) {
                return data.elementary;
            }
            if (data.schedule) {
                for (var key in data.schedule) {
                    if (data.schedule[key] && typeof data.schedule[key] === 'object') {
                        var classes = CONFIG.CLASSES;
                        for (var i = 0; i < classes.length; i++) {
                            if (data.schedule[key] && data.schedule[key][classes[i]]) {
                                return data.schedule[key];
                            }
                        }
                    }
                }
            }
            return null;
        }

        function hasElementaryData(data) {
            var classes = CONFIG.CLASSES;
            for (var day in data) {
                if (data[day]) {
                    for (var i = 0; i < classes.length; i++) {
                        if (data[day][classes[i]]) {
                            return true;
                        }
                    }
                }
            }
            return false;
        }

        // ================================================================
        // ЗАГРУЗКА ДАННЫХ
        // ================================================================
        function loadData() {
            var loadingEl = document.getElementById('loadingState');
            var gridEl = document.getElementById('scheduleGrid');
            var errorEl = document.getElementById('errorState');

            loadingEl.style.display = 'block';
            gridEl.style.display = 'none';
            errorEl.style.display = 'none';

            // Пытаемся загрузить из localStorage
            try {
                var saved = localStorage.getItem('elementaryScheduleData');
                if (saved) {
                    var parsed = JSON.parse(saved);
                    if (parsed.schedule) {
                        var rawData = extractElementaryData(parsed);
                        if (rawData && hasElementaryData(rawData)) {
                            state.data = convertFullData(rawData);
                            state.loaded = true;
                            state.currentDay = getCurrentDay();
                            loadingEl.style.display = 'none';
                            gridEl.style.display = 'block';
                            renderAll();
                            return;
                        }
                    }
                }
            } catch (e) {}

            // Пытаемся загрузить data.json
            fetch('data.json')
                .then(function(response) {
                    if (!response.ok) {
                        throw new Error('Файл data.json не найден (HTTP ' + response.status + ')');
                    }
                    return response.json();
                })
                .then(function(data) {
                    var rawData = extractElementaryData(data);
                    if (!rawData || !hasElementaryData(rawData)) {
                        throw new Error('В файле нет расписания для начальной школы (ключ elementary не найден)');
                    }

                    state.data = convertFullData(rawData);
                    state.loaded = true;
                    state.currentDay = getCurrentDay();
                    loadingEl.style.display = 'none';
                    gridEl.style.display = 'block';

                    try {
                        localStorage.setItem('elementaryScheduleData', JSON.stringify({ schedule: state.data }));
                    } catch (err) {}

                    renderAll();
                })
                .catch(function(err) {
                    loadingEl.style.display = 'none';
                    errorEl.style.display = 'block';
                    document.getElementById('errorMessage').textContent = err.message;
                });
        }

        // ================================================================
        // ОТОБРАЖЕНИЕ
        // ================================================================
        function renderAll() {
            if (!state.data || !state.loaded) return;
            renderHeader();
            renderSchedule();
        }

        function renderHeader() {
            var dayKey = state.currentDay;
            var dayFull = CONFIG.DAYS_RU[CONFIG.DAYS.indexOf(dayKey)] || dayKey;
            document.getElementById('dayLabel').textContent = '📅 ' + dayFull + ' (' + dayKey + ')';
        }

        function renderSchedule() {
            var container = document.getElementById('scheduleGrid');
            var dayKey = state.currentDay;
            var dayData = state.data[dayKey];

            if (!dayData) {
                container.innerHTML =
                    '<div style="text-align:center;padding:40px 0;color:#a5d6a7;font-size:1.1em;">🌱 Нет данных для ' +
                    CONFIG.DAYS_RU[CONFIG.DAYS.indexOf(dayKey)] + '</div>';
                return;
            }

            var classes = CONFIG.CLASSES;
            var html = '';
            for (var i = 0; i < classes.length; i += 4) {
                var group = classes.slice(i, i + 4);
                var rowHtml = '<div class="schedule-row">';
                group.forEach(function(cls) {
                    var lessons = dayData[cls] || [];
                    var blockHtml = '<div class="schedule-block">';
                    blockHtml += '<div class="class-header">' + cls + '</div>';
                    blockHtml += '<table class="lessons-table">';
                    for (var l = 1; l <= CONFIG.MAX_LESSONS; l++) {
                        var lesson = lessons.find(function(les) { return les && les.lesson === l; });
                        var subject = lesson ? lesson.subject : '';
                        var room = lesson ? lesson.room : '';
                        var isEmpty = !subject || subject === 'нет урока' || subject === '';

                        blockHtml += '<tr>';
                        blockHtml += '<td class="lesson-number">' + l + '</td>';
                        blockHtml += '<td class="lesson-subject' + (isEmpty ? ' lesson-empty' : '') + '">' +
                            (isEmpty ? '—' : subject) +
                            '</td>';
                        blockHtml += '<td class="lesson-room">' + (isEmpty ? '' : room) + '</td>';
                        blockHtml += '</tr>';
                    }
                    blockHtml += '</table></div>';
                    rowHtml += blockHtml;
                });
                rowHtml += '</div>';
                html += rowHtml;
            }
            container.innerHTML = html;
        }

        function updateDate() {
            var now = new Date();
            var options = { day: '2-digit', month: 'long', year: 'numeric' };
            document.getElementById('currentDate').textContent = '📅 ' + now.toLocaleDateString('ru-RU', options);
        }

        // ================================================================
        // ИНИЦИАЛИЗАЦИЯ
        // ================================================================
        document.addEventListener('DOMContentLoaded', function() {
            updateDate();
            document.getElementById('versionBadge').textContent = 'v' + APP_VERSION;
            loadData();
        });
    </script>

</body>
</html>
